<template>
    <div class="expense-list-container">

        <!-- ── SUMMARY BANNER ───────────────────────────── -->
        <div class="summary-banner">
            <div class="summary-item">
                <span class="summary-label">Today's Total</span>
                <span class="summary-value">{formattedTodayTotal}</span>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
                <span class="summary-label">Today's Count</span>
                <span class="summary-value">{todayCount}</span>
            </div>
            <template lwc:if={isTodayView}>
                <div class="summary-divider"></div>
                <div class="summary-submit">
                    <template lwc:if={isSubmitting}>
                        <button class="submit-report-btn" disabled>
                            <lightning-spinner size="small" alternative-text="Submitting"></lightning-spinner>
                            Submitting…
                        </button>
                    </template>
                    <template lwc:elseif={isReportSubmitted}>
                        <button class="submit-report-btn submit-report-btn--done" disabled>
                            <lightning-icon icon-name="utility:check" size="xx-small"></lightning-icon>
                            Report Submitted
                        </button>
                    </template>
                    <template lwc:elseif={hasNoExpenses}>
                        <button class="submit-report-btn submit-report-btn--disabled" disabled title="Add at least one expense before submitting">
                            Submit Report
                        </button>
                    </template>
                    <template lwc:else>
                        <button class="submit-report-btn submit-report-btn--active" onclick={handleSubmitReport}>
                            <lightning-icon icon-name="utility:send" size="xx-small"></lightning-icon>
                            Submit Report
                        </button>
                    </template>
                </div>
            </template>
        </div>

        <!-- ── VIEW TOGGLE ──────────────────────────────── -->
        <div class="view-toggle">
            <button
                class={todayTabClass}
                data-view="today"
                onclick={handleViewChange}>
                Today
            </button>
            <button
                class={allTabClass}
                data-view="all"
                onclick={handleViewChange}>
                All My Expenses
            </button>
        </div>

        <!-- ── PENDING SYNC BANNER ───────────────────────── -->
        <template lwc:if={hasPendingExpenses}>
            <div class="sync-banner">
                <div class="sync-banner-left">
                    <lightning-icon icon-name="utility:offline" size="x-small" class="sync-icon"></lightning-icon>
                    <span class="sync-text">
                        <strong>{pendingCount}</strong> expense(s) saved offline, pending sync
                    </span>
                </div>
                <button class="sync-btn" onclick={syncPendingExpenses} disabled={isSyncing}>
                    <template lwc:if={isSyncing}>
                        <lightning-spinner alternative-text="Syncing" size="small" class="sync-spinner"></lightning-spinner>
                    </template>
                    <template lwc:else>
                        Sync Now
                    </template>
                </button>
            </div>
        </template>

        <!-- ── FILTERS ───────────────────────────────────── -->
        <div class="filter-row">
            <!-- Status filter -->
            <div class="filter-group">
                <span class="filter-label">Status:</span>
                <div class="select-wrap-small">
                    <select class="filter-select" onchange={handleStatusFilter}>
                        <template for:each={statusFilterOptions} for:item="opt">
                            <option key={opt.value} value={opt.value} selected={opt.selected}>{opt.label}</option>
                        </template>
                    </select>
                    <lightning-icon icon-name="utility:chevrondown" size="xx-small" class="filter-select-icon"></lightning-icon>
                </div>
            </div>

            <!-- Type filter -->
            <div class="filter-group">
                <span class="filter-label">Type:</span>
                <div class="select-wrap-small">
                    <select class="filter-select" onchange={handleTypeFilter}>
                        <template for:each={typeFilterOptions} for:item="opt">
                            <option key={opt.value} value={opt.value} selected={opt.selected}>{opt.label}</option>
                        </template>
                    </select>
                    <lightning-icon icon-name="utility:chevrondown" size="xx-small" class="filter-select-icon"></lightning-icon>
                </div>
            </div>
        </div>

        <!-- ── RESULTS INFO ──────────────────────────────── -->
        <div class="results-info">
            <span class="results-count">{filteredExpenses.length} expense(s)</span>
            <template lwc:if={hasActiveFilters}>
                <button class="clear-filters-btn" onclick={clearAllFilters}>
                    Clear filters
                </button>
            </template>
        </div>

        <!-- ── EXPENSE LIST ──────────────────────────────── -->
        <div class="list-body">

            <!-- Loading -->
            <template lwc:if={isLoading}>
                <div class="loading-state">
                    <lightning-spinner alternative-text="Loading expenses" size="medium"></lightning-spinner>
                    <p class="loading-text">Loading expenses…</p>
                </div>
            </template>

            <!-- Error -->
            <template lwc:elseif={hasError}>
                <div class="empty-state">
                    <lightning-icon icon-name="utility:error" size="medium" class="error-icon"></lightning-icon>
                    <p class="empty-title">Something went wrong</p>
                    <p class="empty-sub">{errorMessage}</p>
                    <button class="retry-btn" onclick={loadExpenses}>Retry</button>
                </div>
            </template>

            <!-- Empty -->
            <template lwc:elseif={isEmpty}>
                <div class="empty-state">
                    <lightning-icon icon-name="utility:receipt" size="large" class="empty-icon"></lightning-icon>
                    <p class="empty-title">{emptyTitle}</p>
                    <p class="empty-sub">{emptySubtitle}</p>
                </div>
            </template>

            <!-- Cards -->
            <template lwc:else>

                <!-- TODAY view: flat list -->
                <template lwc:if={isTodayView}>
                    <template for:each={filteredExpenses} for:item="exp">
                        <c-expense-card
                            key={exp.id}
                            expense={exp}
                            ondeleteexpense={handleDeleteExpense}
                            onsubmitexpense={handleSubmitExpense}
                            oncardclick={handleCardClick}>
                        </c-expense-card>
                    </template>
                </template>

                <!-- ALL view: 3-level hierarchy Year > Month > Date -->
                <template lwc:else>
                    <template for:each={hierarchicalExpenses} for:item="row">

                        <!-- Single wrapper per row — key lives here on a real element -->
                        <div key={row.key} class="hierarchy-row">

                            <!-- Header bar — same structure for year/month/date, classes differ -->
                            <div class={row.headerClass} data-key={row.key} data-type={row.type} onclick={handleToggleGroup}>
                                <lightning-icon icon-name={row.icon} size="xx-small" class="date-header-icon"></lightning-icon>
                                <span class="expense-date-label">{row.label}</span>
                                <span class="expense-date-count">{row.count} expense(s)</span>
                                <lightning-icon icon-name="utility:chevrondown" size="xx-small" class={row.chevronClass}></lightning-icon>
                            </div>

                            <!-- Cards body — only date rows have expenses -->
                            <template lwc:if={row.hasExpenses}>
                                <div style={row.bodyStyle}>
                                    <template for:each={row.expenses} for:item="exp">
                                        <c-expense-card
                                            key={exp.id}
                                            expense={exp}
                                            ondeleteexpense={handleDeleteExpense}
                                            onsubmitexpense={handleSubmitExpense}
                                            oncardclick={handleCardClick}>
                                        </c-expense-card>
                                    </template>
                                </div>
                            </template>

                        </div>

                    </template>
                </template>

            </template>
        </div>

        <!-- ── MODAL PORTAL (moved to document.body; style injected into head) ── -->
        <div class="elc-portal">

        <!-- ── DELETE CONFIRM DIALOG ─────────────────────── -->
        <div style={deleteModalStyle}>
            <div class="elc-portal-backdrop" onclick={cancelDelete}></div>
            <div class="elc-portal-dialog" role="alertdialog" aria-modal="true">
                <div class="confirm-icon-wrap">
                    <lightning-icon icon-name="utility:warning" size="medium" class="confirm-icon"></lightning-icon>
                </div>
                <h3 class="confirm-title">Delete Expense?</h3>
                <p class="confirm-body">This expense will be permanently deleted and cannot be recovered.</p>
                <div class="confirm-actions">
                    <button class="btn-cancel-confirm" onclick={cancelDelete} disabled={isDeleting}>Cancel</button>
                    <button class="btn-delete-confirm" onclick={confirmDelete} disabled={isDeleting}>
                        <template lwc:if={isDeleting}>Deleting…</template>
                        <template lwc:else>Delete</template>
                    </button>
                </div>
            </div>
        </div>

        <!-- ── EDIT MODAL ────────────────────────────────── -->
        <div style={editModalStyle}>
            <div class="elc-portal-backdrop" onclick={closeEditModal}></div>
            <div class="elc-portal-sheet" role="dialog" aria-modal="true" aria-label="Edit Expense">
                <div class="sheet-handle"></div>
                <div class="sheet-header">
                    <h2 class="sheet-title">Edit Expense</h2>
                    <button class="close-btn" onclick={closeEditModal}>&#10005;</button>
                </div>
                <div class="sheet-body">

                    <!-- Amount -->
                    <div class="form-group">
                        <label class="form-label required-label">Amount (&#8377;)</label>
                        <div class="amount-input-wrap">
                            <span class="currency-symbol">&#8377;</span>
                            <input type="number" class="form-input amount-input"
                                placeholder="0.00" min="0" step="0.01"
                                data-field="amount" value={editForm.amount}
                                oninput={handleEditInput} />
                        </div>
                        <template lwc:if={editErrors.amount}>
                            <span class="field-error">{editErrors.amount}</span>
                        </template>
                    </div>

                    <!-- Expense Type -->
                    <div class="form-group">
                        <label class="form-label required-label">Expense Type</label>
                        <div class="select-wrap">
                            <select class="form-select" data-field="expenseType" onchange={handleEditInput}>
                                <option value="">-- Select Type --</option>
                                <template for:each={editTypeOptions} for:item="opt">
                                    <option key={opt.value} value={opt.value} selected={opt.selected}>{opt.label}</option>
                                </template>
                            </select>
                        </div>
                        <template lwc:if={editErrors.expenseType}>
                            <span class="field-error">{editErrors.expenseType}</span>
                        </template>
                    </div>

                    <!-- Date -->
                    <div class="form-group">
                        <label class="form-label required-label">Expense Date</label>
                        <input type="date" class="form-input"
                            data-field="expenseDate" value={editForm.expenseDate}
                            oninput={handleEditInput} />
                        <template lwc:if={editErrors.expenseDate}>
                            <span class="field-error">{editErrors.expenseDate}</span>
                        </template>
                    </div>

                    <!-- Description -->
                    <div class="form-group">
                        <label class="form-label">Description <span class="optional">(optional)</span></label>
                        <textarea class="form-textarea" placeholder="Enter notes or description…"
                            data-field="description" oninput={handleEditInput}
                            rows="3">{editForm.description}</textarea>
                    </div>

                    <!-- Link Visits -->
                    <div class="form-group">
                        <label class="form-label">Link Visits <span class="optional">(optional)</span></label>

                        <template lwc:if={editVisitsLoading}>
                            <div class="visits-loading">
                                <div class="visits-spinner"></div>
                                <span>Loading visits…</span>
                            </div>
                        </template>

                        <template lwc:elseif={editVisitsError}>
                            <p class="visits-empty">Could not load visits. Check your connection.</p>
                        </template>

                        <template lwc:elseif={editHasVisits}>
                            <div class="visit-list">
                                <template for:each={editVisits} for:item="visit">
                                    <div key={visit.id} class="visit-row"
                                         data-id={visit.id}
                                         onclick={handleEditVisitToggle}>
                                        <div class="visit-check-wrap">
                                            <div class={visit.checkClass}>
                                                <template lwc:if={visit.selected}>&#10003;</template>
                                            </div>
                                        </div>
                                        <div class="visit-info">
                                            <span class="visit-name">{visit.name}</span>
                                            <span class="visit-outlet">{visit.outletName}</span>
                                        </div>
                                    </div>
                                </template>
                            </div>
                            <template lwc:if={editSelectedCountMsg}>
                                <p class="visits-selected-hint">{editSelectedCountMsg}</p>
                            </template>
                        </template>

                        <template lwc:elseif={editNoVisitsForDate}>
                            <p class="visits-empty">No visits found for this date.</p>
                        </template>
                    </div>

                    <!-- Receipts / Documents -->
                    <div class="form-group">
                        <label class="form-label">Receipts / Documents <span class="optional">(optional)</span></label>

                        <!-- Hidden file input — queried from portal div in JS -->
                        <input type="file" class="edit-file-input"
                            accept="image/*,.pdf" multiple
                            onchange={handleEditFileChange} />

                        <!-- Existing files already in Salesforce -->
                        <template lwc:if={existingFilesLoading}>
                            <div class="visits-loading">
                                <div class="visits-spinner"></div>
                                <span>Loading attachments…</span>
                            </div>
                        </template>

                        <template lwc:if={hasExistingFiles}>
                            <div class="file-list">
                                <template for:each={enrichedExistingFiles} for:item="file">
                                    <div key={file.documentId} class="file-chip file-chip--existing">
                                        <template lwc:if={file.isImage}>
                                            <a href={file.downloadUrl} target="_blank" class="file-thumb-link">
                                                <div class="file-thumb file-thumb-existing">
                                                    <lightning-icon icon-name="doctype:image" size="small"></lightning-icon>
                                                </div>
                                            </a>
                                        </template>
                                        <template lwc:else>
                                            <a href={file.downloadUrl} target="_blank" class="file-thumb-link">
                                                <div class="file-thumb file-thumb-existing file-thumb-pdf">
                                                    <lightning-icon icon-name="doctype:pdf" size="small"></lightning-icon>
                                                </div>
                                            </a>
                                        </template>
                                        <div class="file-info">
                                            <span class="file-name">{file.title}</span>
                                            <span class="file-size">{file.formattedSize}</span>
                                        </div>
                                        <button class="file-remove" data-id={file.documentId}
                                                onclick={handleRemoveExistingFile} title="Remove">&#10005;</button>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <!-- New files picked in this session -->
                        <template lwc:if={hasNewFiles}>
                            <div class="file-list">
                                <template for:each={enrichedNewFiles} for:item="file">
                                    <div key={file.id} class="file-chip">
                                        <template lwc:if={file.previewUrl}>
                                            <img src={file.previewUrl} class="file-thumb" alt={file.name} />
                                        </template>
                                        <template lwc:else>
                                            <div class="file-thumb file-thumb-pdf">
                                                <lightning-icon icon-name="doctype:pdf" size="small"></lightning-icon>
                                            </div>
                                        </template>
                                        <div class="file-info">
                                            <span class="file-name">{file.name}</span>
                                            <span class="file-size">{file.formattedSize} · new</span>
                                        </div>
                                        <button class="file-remove" data-id={file.id}
                                                onclick={handleRemoveNewFile} title="Remove">&#10005;</button>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <!-- Upload tap area -->
                        <div class="upload-area" onclick={handleTriggerFilePicker}>
                            <lightning-icon icon-name="utility:upload" size="small" class="upload-icon"></lightning-icon>
                            <span class="upload-text">Tap to upload more</span>
                            <span class="upload-hint">Images or PDF · Max 5 MB each</span>
                        </div>
                    </div>

                </div>

                <div class="sheet-footer">
                    <button class="btn-cancel" onclick={closeEditModal}>Cancel</button>
                    <button class="btn-save" onclick={handleSaveEdit} disabled={isSavingEdit}>
                        <template lwc:if={isSavingEdit}>Saving…</template>
                        <template lwc:else>Save Changes</template>
                    </button>
                </div>
            </div>
        </div><!-- end edit modal -->

        <!-- ── VIEW MODAL (non-Draft expenses) ───────────── -->
        <div style={viewModalStyle}>
            <div class="elc-portal-backdrop" onclick={closeViewModal}></div>
            <div class="elc-portal-sheet" role="dialog" aria-modal="true" aria-label="Expense Details">
                <div class="sheet-handle"></div>
                <div class="sheet-header">
                    <h2 class="sheet-title">Expense Details</h2>
                    <button class="close-btn" onclick={closeViewModal}>&#10005;</button>
                </div>
                <div class="sheet-body">

                    <!-- Status badge -->
                    <div class="view-status-row">
                        <span class={viewStatusClass}>{viewStatus}</span>
                        <span class="view-expense-name">{viewName}</span>
                    </div>

                    <!-- Amount -->
                    <div class="view-row">
                        <span class="view-label">Amount</span>
                        <span class="view-value view-amount">{viewFormattedAmount}</span>
                    </div>

                    <!-- Type -->
                    <div class="view-row">
                        <span class="view-label">Expense Type</span>
                        <span class="view-value">{viewExpenseType}</span>
                    </div>

                    <!-- Date -->
                    <div class="view-row">
                        <span class="view-label">Date</span>
                        <span class="view-value">{viewExpenseDate}</span>
                    </div>

                    <!-- Description -->
                    <template lwc:if={viewHasDescription}>
                        <div class="view-row view-row--col">
                            <span class="view-label">Description</span>
                            <span class="view-value view-description">{viewDescription}</span>
                        </div>
                    </template>

                    <!-- Rejection Reason (only for Rejected expenses) -->
                    <template lwc:if={viewHasRejectionReason}>
                        <div class="view-row view-row--col">
                            <span class="view-label view-label--rejection">Rejection Reason</span>
                            <div class="view-rejection-banner">
                                <lightning-icon icon-name="utility:error" size="x-small" class="view-rejection-icon"></lightning-icon>
                                <span class="view-rejection-text">{viewRejectionReason}</span>
                            </div>
                        </div>
                    </template>

                    <!-- Linked Visits -->
                    <div class="view-row view-row--col">
                        <span class="view-label">Linked Visits</span>
                        <template lwc:if={viewLinkedVisitsLoading}>
                            <div class="visits-loading">
                                <div class="visits-spinner"></div>
                                <span>Loading…</span>
                            </div>
                        </template>
                        <template lwc:elseif={viewHasVisits}>
                            <div class="view-visit-list">
                                <template for:each={viewLinkedVisits} for:item="visit">
                                    <div key={visit.id} class="view-visit-chip">
                                        <span class="view-visit-name">{visit.name}</span>
                                        <template lwc:if={visit.outletName}>
                                            <span class="view-visit-outlet">{visit.outletName}</span>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </template>
                        <template lwc:else>
                            <span class="view-value view-empty">No visits linked</span>
                        </template>
                    </div>

                    <!-- Attachments -->
                    <div class="view-row view-row--col">
                        <span class="view-label">Attachments</span>
                        <template lwc:if={viewFilesLoading}>
                            <div class="visits-loading">
                                <div class="visits-spinner"></div>
                                <span>Loading…</span>
                            </div>
                        </template>
                        <template lwc:elseif={viewHasFiles}>
                            <div class="file-list">
                                <template for:each={viewFiles} for:item="file">
                                    <div key={file.documentId} class="file-chip file-chip--existing">
                                        <a href={file.downloadUrl} target="_blank" class="file-thumb-link">
                                            <div class="file-thumb file-thumb-existing">
                                                <lightning-icon icon-name="doctype:attachment" size="small"></lightning-icon>
                                            </div>
                                        </a>
                                        <div class="file-info">
                                            <span class="file-name">{file.title}</span>
                                            <span class="file-size">{file.formattedSize}</span>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                        <template lwc:else>
                            <span class="view-value view-empty">No attachments</span>
                        </template>
                    </div>

                </div>

                <div class="sheet-footer">
                    <button class="btn-cancel" onclick={closeViewModal}>Close</button>
                </div>
            </div>
        </div><!-- end view modal -->

        </div><!-- end .elc-portal -->

    </div>
</template>
