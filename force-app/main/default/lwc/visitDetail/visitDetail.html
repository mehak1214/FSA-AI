<template>
    <section class="page" role="dialog" aria-modal="true">

        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="large" variant="brand"></lightning-spinner>
        </template>

        <div class="sheet">
            <!-- Hero / Header -->
            <div class="hero">

                <!-- Row 1: Back + Status badge -->
                <div class="hero-top">
                    <button class="back-btn" onclick={handleClose} title="Back">&#8592;</button>
                    <div class="hero-top-right">
                        <span class={statusBadgeClass}>{visitStatus}</span>
                    </div>
                </div>

                <!-- Row 2: Store photo + eyebrow + name side by side -->
                <div class="hero-identity">
                    <template if:true={hasOutletPhoto}>
                        <div class="hero-thumb">
                            <img src={outletPhotoUrl} alt="Store photo" />
                        </div>
                    </template>
                    <div class="hero-identity-text">
                        <!-- Eyebrow — visit name + sequence -->
                        <p class="hero-eyebrow">
                            <span class="hero-eyebrow-name">{visitName}</span>
                            <template if:true={sequenceLabel}>
                                <span class="hero-eyebrow-seq"> · Visit #{sequenceLabel}</span>
                            </template>
                        </p>
                        <!-- Store name (tappable) -->
                        <h2 class="hero-outlet-name">
                            <button type="button" class="outlet-link" onclick={handleOpenOutlet360}
                                disabled={outletLinkDisabled} title="Open Store 360">
                                {outletName}
                            </button>
                        </h2>
                    </div>
                </div>

                <!-- Row 3: Phone chip + Address chip + Directions pill — all inline -->
                <div class="hero-meta-row">
                    <template if:true={outletPhone}>
                        <a href="tel:{outletPhone}" class="hero-meta-chip hero-meta-link">&#128222; {outletPhone}</a>
                    </template>
                    <template if:true={hasAddress}>
                        <span class="hero-meta-chip hero-meta-address">&#128205; {outletAddress}</span>
                    </template>
                    <button class="map-mini-btn" onclick={navigateToMap} type="button" disabled={mapDisabled}
                        title="Directions">
                        <lightning-icon icon-name="utility:location" size="x-small"></lightning-icon>
                        <span class="map-mini-label">Directions</span>
                    </button>
                </div>

            </div>

            <div class="content">
                <!-- Visit Timing -->
                <div class="card card--timing">
                    <div class="timing-row">
                        <div class="timing-item">
                            <span class="timing-label">Planned</span>
                            <span class="timing-value">{plannedStart} – {plannedEnd}</span>
                        </div>
                        <div class="timing-divider"></div>
                        <div class="timing-item">
                            <span class="timing-label">Check-in / out</span>
                            <span class="timing-value">{checkInTime} – {checkOutTime}</span>
                        </div>
                        <div class="timing-divider"></div>
                        <div class="timing-item timing-item--duration">
                            <span class="timing-label">Duration</span>
                            <span class="timing-value timing-value--accent">{duration}</span>
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="card">
                    <div class="card-head">
                        <span class="card-title">Actions</span>
                    </div>
                    <div class="action-grid">
                        <template if:true={actionInFlight}>
                            <div class="action-helper">Grabbing GPS...</div>
                        </template>
                        <template if:true={showCheckIn}>
                            <button class="btn success action-main" onclick={handleCheckIn} type="button"
                                disabled={actionInFlight}>
                                <span>Check In</span>
                            </button>
                        </template>

                        <template if:true={showCheckOut}>
                            <button class="btn danger action-main" onclick={handleCheckOut} type="button"
                                disabled={actionInFlight}>
                                <span>Check Out</span>
                            </button>
                        </template>

                        <template if:true={showDayCompletedMessage}>
                            <div class="day-completed-message">
                                Day already completed.
                            </div>
                        </template>

                        <template if:true={showStartDayMessage}>
                            <div class="start-day-message">
                                To check-in, start your day first.
                            </div>
                        </template>

                        <template if:true={hasVisitPhoto}>
                            <button class="btn secondary action-photo" onclick={handleOpenPhotoModal} type="button"
                                title="Preview Visit Photo">
                                <span>Preview Photo</span>
                            </button>
                        </template>

                        <template if:false={hasVisitPhoto}>
                            <button class="btn primary action-photo" onclick={handleTakePhoto} type="button">
                                <span>Take Photo</span>
                            </button>
                        </template>

                        <button class="btn primary action-order" onclick={handleToggleOrderPanel} type="button">
                            <span>{orderToggleLabel}</span>
                        </button>

                        <button class="btn secondary action-orders" onclick={handleOpenOrdersModal} type="button">
                            <span>View Order</span>
                        </button>

                        <button class="btn secondary action-orders" onclick={handleOpenSchemesModal} type="button">
                            <span>Schemes</span>
                        </button>

                        <button class="btn secondary action-request" onclick={handleOpenAssetRequest} type="button">
                            <span>Request New Asset</span>
                        </button>

                    </div>
                </div>

                <!-- Tasks -->
                <template if:true={showTasksCard}>
                    <div class="card">
                        <div class="card-head">
                            <span class="card-title">Tasks</span>
                            <span class="task-count-badge">{taskCountLabel}</span>
                        </div>
                        <template if:true={isLoadingTasks}>
                            <lightning-spinner alternative-text="Loading tasks" size="small" variant="brand"></lightning-spinner>
                        </template>
                        <template if:false={isLoadingTasks}>
                            <template if:true={hasTasks}>
                                <div class="task-list">
                                    <template for:each={decoratedTasks} for:item="task">
                                        <div key={task.Id} class={task.itemClass}>

                                            <!-- Always-visible header row -->
                                            <div class="task-header" data-id={task.Id} onclick={handleTaskToggle}>
                                                <div class="task-left">
                                                    <div class="task-badges">
                                                        <span class={task.statusBadgeClass}>{task.Status__c}</span>
                                                        <template if:true={task.Is_Mandatory__c}>
                                                            <span class="task-mandatory-badge">Mandatory</span>
                                                        </template>
                                                    </div>
                                                    <p class="task-type">{task.Task_Type__c}</p>
                                                    <p class="task-id">{task.Name}</p>
                                                </div>
                                                <span class="task-chevron">{task.chevron}</span>
                                            </div>

                                            <!-- Expanded body -->
                                            <template if:true={task.isExpanded}>
                                                <div class="task-body">
                                                    <div class="task-detail-row">
                                                        <span class="task-detail-label">Asset</span>
                                                        <span class="task-detail-value">{task.assetName}</span>
                                                    </div>

                                                    <template if:true={task.hasInstructions}>
                                                        <div class="task-instructions-box">
                                                            <p class="task-detail-label">Manager instructions</p>
                                                            <p class="task-instructions-text">{task.Manager_Instructions__c}</p>
                                                        </div>
                                                    </template>

                                                    <template if:true={task.isBlocked}>
                                                        <div class="task-exception-box">
                                                            <p class="task-detail-label">Block reason</p>
                                                            <p class="task-exception-text">{task.Exception_Reason__c}</p>
                                                        </div>
                                                    </template>

                                                    <template if:true={task.isPending}>
                                                        <div class="task-action-row">
                                                            <button
                                                                class="task-btn task-btn--complete"
                                                                data-id={task.Id}
                                                                onclick={handleCompleteTask}
                                                                disabled={isActingOnTask}>
                                                                ✓ Mark complete
                                                            </button>
                                                            <button
                                                                class="task-btn task-btn--block"
                                                                data-id={task.Id}
                                                                onclick={handleOpenBlockDialog}>
                                                                Block
                                                            </button>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>

                                        </div>
                                    </template>
                                </div>
                            </template>
                            <template if:false={hasTasks}>
                                <p class="task-empty">No tasks assigned for this visit.</p>
                            </template>
                        </template>
                    </div>
                </template>

                <template if:true={showRelatedLists}>
                    <div class="card related-card">
                        <div class="card-head">
                            <span class="card-title">Store Related Data</span>
                        </div>

                        <template if:true={isLoadingRelated}>
                            <lightning-spinner alternative-text="Loading related data" size="small" variant="brand"></lightning-spinner>
                        </template>

                        <template if:false={isLoadingRelated}>
                            <div class="tab-bar-wrap">
                                <span class="tab-scroll-hint tab-scroll-hint--left" aria-hidden="true">&#8249;</span>
                                <div class="tab-bar" role="tablist" aria-label="Store related data tabs">
                                    <button type="button" class={relatedTabClassAssets} data-tab="assets" onclick={handleRelatedTabClick}>Assets</button>
                                    <button type="button" class={relatedTabClassOrders} data-tab="orders" onclick={handleRelatedTabClick}>Order History</button>
                                    <button type="button" class={relatedTabClassProducts} data-tab="products" onclick={handleRelatedTabClick}>Order Products</button>
                                    <button type="button" class={relatedTabClassCases} data-tab="cases" onclick={handleRelatedTabClick}>Cases</button>
                                    <button type="button" class={relatedTabClassAssetRequests} data-tab="assetRequests" onclick={handleRelatedTabClick}>Asset Requests</button>
                                </div>
                                <span class="tab-scroll-hint tab-scroll-hint--right" aria-hidden="true">&#8250;</span>
                            </div>
                            <div class="tab-scroll-copy">Swipe horizontally to see more tabs</div>

                            <template if:true={isRelatedTabAssets}>
                                <div class="section-head">
                                    <h2 class="section-title">{relatedAssetsLabel}</h2>
                                    <div class="section-actions">
                                        <button
                                            class={relatedRefreshButtonClass}
                                            type="button"
                                            onclick={handleRefreshRelatedData}
                                            title="Refresh assets"
                                            aria-label="Refresh assets"
                                            disabled={isRelatedRefreshDisabled}>
                                            <span class={relatedRefreshIconClass} aria-hidden="true">
                                                <lightning-icon icon-name="utility:refresh" size="x-small" alternative-text="Refresh"></lightning-icon>
                                            </span>
                                        </button>
                                        <template if:true={isRefreshingRelated}>
                                            <span class="related-refresh-status" role="status">Refreshing...</span>
                                        </template>
                                        <template if:true={showViewAllRelatedAssets}>
                                            <button class="btn secondary" type="button" onclick={handleOpenRelatedAssetsModal}>View All</button>
                                        </template>
                                    </div>
                                </div>
                                <template if:true={hasRelatedAssets}>
                                    <div class="table-wrap table-wrap--asset">
                                        <table class="summary summary--asset">
                                            <thead><tr><th>Asset</th><th>Serial</th><th>Status</th><th>Last Audit</th><th>Condition</th></tr></thead>
                                            <tbody>
                                                <template for:each={assets} for:item="item">
                                                    <tr key={item.rowKey} class="order-row-clickable" data-id={item.assetId} onclick={handleRelatedAssetClick}>
                                                        <td class="order-name-cell">{item.name}</td>
                                                        <td>{item.serialNumber}</td>
                                                        <td>{item.status}</td>
                                                        <td>{item.lastAuditDateLabel}</td>
                                                        <td>{item.lastCondition}</td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </template>
                                <template if:false={hasRelatedAssets}>
                                    <div class="state">No assets found for this store.</div>
                                </template>
                            </template>

                            <template if:true={isRelatedTabOrders}>
                                <div class="section-head">
                                    <h2 class="section-title">{relatedOrdersLabel}</h2>
                                    <div class="section-actions">
                                        <button
                                            class={relatedRefreshButtonClass}
                                            type="button"
                                            onclick={handleRefreshRelatedData}
                                            title="Refresh orders"
                                            aria-label="Refresh orders"
                                            disabled={isRelatedRefreshDisabled}>
                                            <span class={relatedRefreshIconClass} aria-hidden="true">
                                                <lightning-icon icon-name="utility:refresh" size="x-small" alternative-text="Refresh"></lightning-icon>
                                            </span>
                                        </button>
                                        <template if:true={isRefreshingRelated}>
                                            <span class="related-refresh-status" role="status">Refreshing...</span>
                                        </template>
                                        <template if:true={showViewAllRelatedOrders}>
                                            <button class="btn secondary" type="button" onclick={handleOpenRelatedOrdersModal}>View All</button>
                                        </template>
                                    </div>
                                </div>
                                <template if:true={hasRelatedOrders}>
                                    <div class="table-wrap">
                                        <table class="summary">
                                            <thead><tr><th>Order</th><th>Amount</th><th>Date</th><th>Status</th></tr></thead>
                                            <tbody>
                                                <template for:each={recentOrders} for:item="item">
                                                    <tr key={item.rowKey} class="order-row-clickable" data-id={item.recordId} onclick={handleRelatedOrderClick}>
                                                        <td class="order-name-cell">{item.name}</td>
                                                        <td>{item.amountLabel}</td>
                                                        <td>{item.dateLabel}</td>
                                                        <td>{item.status}</td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </template>
                                <template if:false={hasRelatedOrders}>
                                    <div class="state">No orders found for this store.</div>
                                </template>
                            </template>

                            <template if:true={isRelatedTabProducts}>
                                <div class="section-head">
                                    <h2 class="section-title">Order Products</h2>
                                    <div class="section-actions">
                                        <button
                                            class={relatedRefreshButtonClass}
                                            type="button"
                                            onclick={handleRefreshRelatedData}
                                            title="Refresh order products"
                                            aria-label="Refresh order products"
                                            disabled={isRelatedRefreshDisabled}>
                                            <span class={relatedRefreshIconClass} aria-hidden="true">
                                                <lightning-icon icon-name="utility:refresh" size="x-small" alternative-text="Refresh"></lightning-icon>
                                            </span>
                                        </button>
                                        <template if:true={isRefreshingRelated}>
                                            <span class="related-refresh-status" role="status">Refreshing...</span>
                                        </template>
                                        <template if:true={showViewAllRelatedProducts}>
                                            <button class="btn secondary" type="button" onclick={handleOpenRelatedProductsModal}>View All</button>
                                        </template>
                                    </div>
                                </div>
                                <template if:true={hasRelatedProducts}>
                                    <div class="table-wrap">
                                        <table class="summary">
                                            <thead><tr><th>Order</th><th>Product</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr></thead>
                                            <tbody>
                                                <template for:each={orderProducts} for:item="item">
                                                    <tr key={item.rowKey}>
                                                        <td>{item.orderName}</td>
                                                        <td>{item.productName}</td>
                                                        <td>{item.quantity}</td>
                                                        <td>{item.unitPriceLabel}</td>
                                                        <td>{item.totalPriceLabel}</td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </template>
                                <template if:false={hasRelatedProducts}>
                                    <div class="state">No order products found for this store.</div>
                                </template>
                            </template>

                            <template if:true={isRelatedTabCases}>
                                <div class="section-head">
                                    <h2 class="section-title">{relatedCasesLabel}</h2>
                                    <div class="section-actions">
                                        <button
                                            class={relatedRefreshButtonClass}
                                            type="button"
                                            onclick={handleRefreshRelatedData}
                                            title="Refresh cases"
                                            aria-label="Refresh cases"
                                            disabled={isRelatedRefreshDisabled}>
                                            <span class={relatedRefreshIconClass} aria-hidden="true">
                                                <lightning-icon icon-name="utility:refresh" size="x-small" alternative-text="Refresh"></lightning-icon>
                                            </span>
                                        </button>
                                        <template if:true={isRefreshingRelated}>
                                            <span class="related-refresh-status" role="status">Refreshing...</span>
                                        </template>
                                        <template if:true={showViewAllRelatedCases}>
                                            <button class="btn secondary" type="button" onclick={handleOpenRelatedCasesModal}>View All</button>
                                        </template>
                                    </div>
                                </div>
                                <template if:true={hasRelatedCases}>
                                    <div class="table-wrap">
                                        <table class="summary">
                                            <thead><tr><th>Case No.</th><th>Order</th><th>Type</th><th>Reason</th><th>Solution</th><th>Total</th><th>Owner</th></tr></thead>
                                            <tbody>
                                                <template for:each={cases} for:item="item">
                                                    <tr key={item.rowKey}>
                                                        <td><button class="case-link" type="button" data-id={item.caseId} onclick={handleRelatedCaseClick}>{item.caseNumber}</button></td>
                                                        <td>{item.orderName}</td>
                                                        <td>{item.caseType}</td>
                                                        <td>{item.caseReason}</td>
                                                        <td>{item.solutionRequired}</td>
                                                        <td>{item.totalPriceLabel}</td>
                                                        <td>{item.ownerName}</td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </template>
                                <template if:false={hasRelatedCases}>
                                    <div class="state">No cases found for this store.</div>
                                </template>
                            </template>

                            <template if:true={isRelatedTabAssetRequests}>
                                <div class="section-head">
                                    <h2 class="section-title">{relatedAssetRequestsLabel}</h2>
                                    <div class="section-actions">
                                        <button
                                            class={relatedRefreshButtonClass}
                                            type="button"
                                            onclick={handleRefreshRelatedData}
                                            title="Refresh asset requests"
                                            aria-label="Refresh asset requests"
                                            disabled={isRelatedRefreshDisabled}>
                                            <span class={relatedRefreshIconClass} aria-hidden="true">
                                                <lightning-icon icon-name="utility:refresh" size="x-small" alternative-text="Refresh"></lightning-icon>
                                            </span>
                                        </button>
                                        <template if:true={isRefreshingRelated}>
                                            <span class="related-refresh-status" role="status">Refreshing...</span>
                                        </template>
                                        <template if:true={showViewAllRelatedAssetRequests}>
                                            <button class="btn secondary" type="button" onclick={handleOpenRelatedAssetRequestsModal}>View All</button>
                                        </template>
                                    </div>
                                </div>
                                <template if:true={hasRelatedAssetRequests}>
                                    <div class="table-wrap">
                                        <table class="summary">
                                            <thead><tr><th>Request</th><th>Product</th><th>Type</th><th>Status</th><th>Requested Install</th><th>Created</th></tr></thead>
                                            <tbody>
                                                <template for:each={assetRequests} for:item="item">
                                                    <tr key={item.rowKey} class="order-row-clickable" data-id={item.requestId} onclick={handleRelatedAssetRequestClick}>
                                                        <td class="order-name-cell">{item.requestNumber}</td>
                                                        <td>{item.productName}</td>
                                                        <td>{item.requestType}</td>
                                                        <td>{item.status}</td>
                                                        <td>{item.requestedInstallationDateLabel}</td>
                                                        <td>{item.createdDateLabel}</td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </template>
                                <template if:false={hasRelatedAssetRequests}>
                                    <div class="state">No asset requests found for this store.</div>
                                </template>
                            </template>
                        </template>
                    </div>
                </template>

                <!-- Meeting Notes Card -->
                <div class="card">
                    <div class="card-head">
                        <span class="card-title">Meeting Notes</span>
                        <template if:false={showNotesInput}>
                            <button class="btn btn-sm" type="button" onclick={handleAddNote}>
                                + Add Note
                            </button>
                        </template>
                    </div>

                    <!-- Saved notes tiles -->
                    <template if:true={hasSavedNotes}>
                        <div class="notes-tiles">
                            <template for:each={savedNotesList} for:item="note">
                                <div key={note.id} class="note-tile">
                                    <div class="note-tile-body">
                                        <p class="note-tile-text">{note.text}</p>
                                        <span class="note-tile-meta">{note.dateLabel}</span>
                                    </div>
                                    <div class="note-tile-actions">
                                        <button class="note-action-btn note-edit-btn" type="button"
                                            data-id={note.id} onclick={handleEditNote} title="Edit">
                                            ✎
                                        </button>
                                        <button class="note-action-btn note-delete-btn" type="button"
                                            data-id={note.id} onclick={handleDeleteNote} title="Delete">
                                            ✕
                                        </button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- Input area: shown when composing a new note or editing -->
                    <template if:true={showNotesInput}>
                        <div class="notes-compose">
                            <lightning-textarea
                                label={notesInputLabel}
                                value={meetingNotes}
                                onchange={handleMeetingNotesChange}
                                placeholder="Add meeting summary, commitments, next steps...">
                            </lightning-textarea>

                            <!-- Attachments block — visible while composing -->
                            <div class="notes-attachments-block">
                                <div class="notes-attachments-header">
                                    <span class="notes-attachments-title">Attachments</span>
                                </div>

                                <!-- Recently uploaded files list with delete -->
                                <template if:true={hasRecentUploads}>
                                    <div class="notes-uploaded-files">
                                        <template for:each={recentUploadFiles} for:item="file">
                                            <div key={file.documentId} class="notes-uploaded-file">
                                                <span class="notes-file-icon">📎</span>
                                                <span class="notes-file-name">{file.name}</span>
                                                <button class="notes-file-remove-btn" type="button"
                                                    data-id={file.documentId}
                                                    onclick={handleRemoveAttachment}
                                                    title="Remove attachment">✕</button>
                                            </div>
                                        </template>
                                    </div>
                                </template>

                                <div class="notes-upload-btn-wrap">
                                    <lightning-file-upload
                                        label="Attach files to this visit"
                                        record-id={currentVisitId}
                                        multiple
                                        onuploadfinished={handleVisitFileUploadFinished}>
                                    </lightning-file-upload>
                                </div>
                            </div>

                            <div class="notes-compose-actions">
                                <button class="btn secondary" type="button" onclick={handleCancelNote}
                                    disabled={meetingNotesSaving}>
                                    Cancel
                                </button>
                                <button class="btn primary notes-save-btn" type="button"
                                    onclick={handleSaveMeetingNotes}
                                    disabled={meetingNotesSaving}>
                                    <template if:true={meetingNotesSaving}>Saving...</template>
                                    <template if:false={meetingNotesSaving}>Save Note</template>
                                </button>
                            </div>
                        </div>
                    </template>


                </div>

                <!-- Rating & Feedback -->
                <template if:true={showRatingFeedback}>
                    <div class="card">
                        <div class="card-head">
                            <span class="card-title">Rating &amp; Feedback</span>
                            <template if:true={ratingFeedbackSaved}>
                                <span class="pill success">&#10003; Saved</span>
                            </template>
                        </div>

                        <!-- 5-Star Rating -->
                        <div class="rating-row">
                            <p class="label">Rate this visit</p>
                            <div class="star-group">
                                <template for:each={starList} for:item="star">
                                    <button
                                        key={star.value}
                                        type="button"
                                        class={star.cssClass}
                                        data-value={star.value}
                                        onclick={handleStarClick}
                                        title={star.label}
                                        aria-label={star.label}>
                                        &#9733;
                                    </button>
                                </template>
                            </div>
                        </div>

                        <!-- Feedback Text Area -->
                        <div class="rating-feedback-area">
                            <lightning-textarea
                                label="Feedback"
                                value={visitFeedback}
                                onchange={handleFeedbackChange}
                                placeholder="Share your feedback about this visit...">
                            </lightning-textarea>
                        </div>

                        <div class="rating-actions">
                            <template if:false={ratingFeedbackSaved}>
                                <p class="checkout-warning">&#9888; Save rating &amp; feedback to enable Check Out.</p>
                            </template>
                            <button
                                class="btn primary notes-save-btn"
                                onclick={handleSaveRatingFeedback}
                                type="button"
                                disabled={ratingFeedbackSaving}>
                                <lightning-icon icon-name="utility:save" size="x-small"></lightning-icon>
                                <template if:true={ratingFeedbackSaving}>
                                    <span>Saving...</span>
                                </template>
                                <template if:false={ratingFeedbackSaving}>
                                    <span>Save Rating &amp; Feedback</span>
                                </template>
                            </button>
                        </div>
                    </div>
                </template>

            </div>

        </div>
        <!-- END .sheet — modals are intentionally outside the scrollable sheet
             so they stay fixed to the viewport on mobile -->

        <!-- Block-task dialog -->
        <dialog class="vd-dialog block-task-dialog" onclose={handleBlockDialogClose}>
            <div class="vd-backdrop" onclick={handleCloseBlockDialog}></div>
            <div class="vd-shell">
                <header class="vd-header">
                    <div class="vd-title-row">
                        <span class="vd-badge">Task</span>
                        <h2 class="vd-title">Block task</h2>
                    </div>
                    <button class="vd-close-btn" type="button" onclick={handleCloseBlockDialog} aria-label="Close">&#10005;</button>
                </header>
                <div class="vd-body">
                    <template if:true={blockingTask}>
                        <p class="block-task-name">{blockingTask.Task_Type__c}</p>
                        <p class="block-task-sub">{blockingTask.Name}</p>
                        <div class="block-reason-wrap">
                            <lightning-textarea
                                label="Reason for blocking"
                                value={blockReason}
                                onchange={handleBlockReasonChange}
                                placeholder="Describe why the retailer refused or what is blocking this task..."
                                rows="4"
                                required>
                            </lightning-textarea>
                        </div>
                    </template>
                </div>
                <footer class="vd-footer">
                    <button class="vd-btn-secondary" type="button" onclick={handleCloseBlockDialog}>Cancel</button>
                    <button class="vd-btn-danger" type="button" onclick={handleConfirmBlock} disabled={isActingOnTask}>
                        <template if:true={isActingOnTask}>Saving...</template>
                        <template if:false={isActingOnTask}>Confirm block</template>
                    </button>
                </footer>
            </div>
        </dialog>

        <!-- Photo modal -->
        <dialog class="vd-dialog photo-dialog" onclose={handleClosePhotoModal}>
            <div class="vd-backdrop" onclick={handleClosePhotoModal}></div>
            <div class="vd-shell">
                <header class="vd-header">
                    <div class="vd-title-row">
                        <span class="vd-badge">Visit</span>
                        <h2 class="vd-title">Visit Photo</h2>
                    </div>
                    <button class="vd-close-btn" type="button" onclick={handleClosePhotoModal} aria-label="Close">&#10005;</button>
                </header>
                <div class="vd-body">
                    <template if:true={hasVisitPhoto}>
                        <img src={imageUrl} alt="Visit Photo" class="photo-preview" />
                    </template>
                    <template if:false={hasVisitPhoto}>
                        <div class="vd-empty">No photo available.</div>
                    </template>
                </div>
                <footer class="vd-footer">
                    <button class="vd-btn-secondary" type="button" onclick={handleClosePhotoModal}>Close</button>
                    <button class="vd-btn-danger" type="button" onclick={handleDeletePhoto}>Delete Photo</button>
                </footer>
            </div>
        </dialog>

        <!-- Schemes modal -->
        <dialog class="vd-dialog vd-dialog-wide schemes-dialog" onclose={handleSchemesDialogClose}>
            <div class="vd-backdrop" onclick={handleCloseSchemesModal}></div>
            <div class="vd-shell">
                <header class="vd-header">
                    <div class="vd-title-row">
                        <span class="vd-badge">Schemes</span>
                        <h2 class="vd-title">Schemes</h2>
                    </div>
                    <button class="vd-close-btn" type="button" onclick={handleCloseSchemesModal} aria-label="Close">&#10005;</button>
                </header>
                <div class="vd-body vd-body-flush">
                    <c-view-schemes></c-view-schemes>
                </div>
                <footer class="vd-footer">
                    <button class="vd-btn-secondary" type="button" onclick={handleCloseSchemesModal}>Close</button>
                </footer>
            </div>
        </dialog>

        <!-- Order modal -->
        <dialog class="vd-dialog vd-dialog-wide order-dialog" onclose={handleOrderDialogClose}>
            <div class="vd-backdrop" onclick={handleToggleOrderPanel}></div>
            <div class="vd-shell">
                <header class="vd-header">
                    <div class="vd-title-row">
                        <span class="vd-badge">Order</span>
                        <!-- <h2 class="vd-title">Create Order</h2> -->
                    </div>
                    <button class="vd-close-btn" type="button" onclick={handleToggleOrderPanel} aria-label="Close">&#10005;</button>
                </header>
                <div class="vd-body vd-body-flush">
                    <c-place-order franchise-id={visitFranchiseId} visit-id={currentVisitId} onordercreated={handleOrderCreated}>
                    </c-place-order>
                </div>
                <!-- <footer class="vd-footer">
                    <button class="vd-btn-secondary" type="button" onclick={handleToggleOrderPanel}>Close</button>
                </footer> -->
            </div>
        </dialog>

        <!-- Orders View dialog -->
        <dialog class="vd-dialog vd-dialog-wide orders-dialog" onclose={handleOrdersDialogClose}>
            <div class="vd-backdrop" onclick={handleCloseOrdersModal}></div>
            <div class="vd-shell">
                <header class="vd-header">
                    <div class="vd-title-row">
                        <span class="vd-badge">Orders</span>
                        <!-- <h2 class="vd-title">My Orders</h2> -->
                    </div>
                    <button class="vd-close-btn" type="button" onclick={handleCloseOrdersModal} aria-label="Close">&#10005;</button>
                </header>
                <div class="vd-body vd-body-flush">
                    <c-orders-by-user visit-franchise-id={visitFranchiseId} onorderselected={handleOrderSelected}></c-orders-by-user>
                </div>
                <footer class="vd-footer">
                    <button class="vd-btn-secondary" type="button" onclick={handleCloseOrdersModal}>Close</button>
                </footer>
            </div>
        </dialog>

        <!-- orderDetail popup — opens when an order card is tapped -->
        <dialog class="vd-dialog vd-dialog-wide related-assets-dialog" onclose={handleRelatedDialogClose}>
            <div class="vd-backdrop" onclick={handleCloseRelatedAssetsModal}></div>
            <div class="vd-shell">
                <header class="vd-header">
                    <div class="vd-title-row">
                        <span class="vd-badge">Assets</span>
                        <h2 class="vd-title">All Assets</h2>
                    </div>
                    <button class="vd-close-btn" type="button" onclick={handleCloseRelatedAssetsModal} aria-label="Close">&#10005;</button>
                </header>
                <div class="vd-body">
                    <template if:true={hasAllRelatedAssets}>
                        <div class="table-wrap table-wrap--flush table-wrap--asset">
                            <table class="summary summary--asset">
                                <thead><tr><th>Asset</th><th>Serial</th><th>Status</th><th>Last Audit</th><th>Condition</th></tr></thead>
                                <tbody>
                                    <template for:each={allAssets} for:item="item">
                                        <tr key={item.rowKey} class="order-row-clickable" data-id={item.assetId} onclick={handleRelatedAssetClick}>
                                            <td class="order-name-cell">{item.name}</td>
                                            <td>{item.serialNumber}</td>
                                            <td>{item.status}</td>
                                            <td>{item.lastAuditDateLabel}</td>
                                            <td>{item.lastCondition}</td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>
                </div>
                <footer class="vd-footer">
                    <button class="vd-btn-secondary" type="button" onclick={handleCloseRelatedAssetsModal}>Close</button>
                </footer>
            </div>
        </dialog>

        <dialog class="vd-dialog vd-dialog-wide related-orders-dialog" onclose={handleRelatedDialogClose}>
            <div class="vd-backdrop" onclick={handleCloseRelatedOrdersModal}></div>
            <div class="vd-shell">
                <header class="vd-header">
                    <div class="vd-title-row">
                        <span class="vd-badge">Orders</span>
                        <h2 class="vd-title">All Orders</h2>
                    </div>
                    <button class="vd-close-btn" type="button" onclick={handleCloseRelatedOrdersModal} aria-label="Close">&#10005;</button>
                </header>
                <div class="vd-body">
                    <template if:true={hasAllRelatedOrders}>
                        <div class="table-wrap table-wrap--flush">
                            <table class="summary">
                                <thead><tr><th>Order</th><th>Amount</th><th>Date</th><th>Status</th></tr></thead>
                                <tbody>
                                    <template for:each={allOrders} for:item="item">
                                        <tr key={item.rowKey} class="order-row-clickable" data-id={item.recordId} onclick={handleRelatedOrderClick}>
                                            <td class="order-name-cell">{item.name}</td>
                                            <td>{item.amountLabel}</td>
                                            <td>{item.dateLabel}</td>
                                            <td>{item.status}</td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>
                </div>
                <footer class="vd-footer">
                    <button class="vd-btn-secondary" type="button" onclick={handleCloseRelatedOrdersModal}>Close</button>
                </footer>
            </div>
        </dialog>

        <dialog class="vd-dialog vd-dialog-wide related-products-dialog" onclose={handleRelatedDialogClose}>
            <div class="vd-backdrop" onclick={handleCloseRelatedProductsModal}></div>
            <div class="vd-shell">
                <header class="vd-header">
                    <div class="vd-title-row">
                        <span class="vd-badge">Order Products</span>
                        <h2 class="vd-title">All Order Products</h2>
                    </div>
                    <button class="vd-close-btn" type="button" onclick={handleCloseRelatedProductsModal} aria-label="Close">&#10005;</button>
                </header>
                <div class="vd-body">
                    <template if:true={hasAllRelatedProducts}>
                        <div class="table-wrap table-wrap--flush">
                            <table class="summary">
                                <thead><tr><th>Order</th><th>Product</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr></thead>
                                <tbody>
                                    <template for:each={allOrderProducts} for:item="item">
                                        <tr key={item.rowKey}>
                                            <td>{item.orderName}</td>
                                            <td>{item.productName}</td>
                                            <td>{item.quantity}</td>
                                            <td>{item.unitPriceLabel}</td>
                                            <td>{item.totalPriceLabel}</td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>
                </div>
                <footer class="vd-footer">
                    <button class="vd-btn-secondary" type="button" onclick={handleCloseRelatedProductsModal}>Close</button>
                </footer>
            </div>
        </dialog>

        <dialog class="vd-dialog vd-dialog-wide related-cases-dialog" onclose={handleRelatedDialogClose}>
            <div class="vd-backdrop" onclick={handleCloseRelatedCasesModal}></div>
            <div class="vd-shell">
                <header class="vd-header">
                    <div class="vd-title-row">
                        <span class="vd-badge">Cases</span>
                        <h2 class="vd-title">All Cases</h2>
                    </div>
                    <button class="vd-close-btn" type="button" onclick={handleCloseRelatedCasesModal} aria-label="Close">&#10005;</button>
                </header>
                <div class="vd-body">
                    <template if:true={hasAllRelatedCases}>
                        <div class="table-wrap table-wrap--flush">
                            <table class="summary">
                                <thead><tr><th>Case No.</th><th>Order</th><th>Type</th><th>Reason</th><th>Solution</th><th>Total</th><th>Owner</th></tr></thead>
                                <tbody>
                                    <template for:each={allCases} for:item="item">
                                        <tr key={item.rowKey}>
                                            <td><button class="case-link" type="button" data-id={item.caseId} onclick={handleRelatedCaseClick}>{item.caseNumber}</button></td>
                                            <td>{item.orderName}</td>
                                            <td>{item.caseType}</td>
                                            <td>{item.caseReason}</td>
                                            <td>{item.solutionRequired}</td>
                                            <td>{item.totalPriceLabel}</td>
                                            <td>{item.ownerName}</td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>
                </div>
                <footer class="vd-footer">
                    <button class="vd-btn-secondary" type="button" onclick={handleCloseRelatedCasesModal}>Close</button>
                </footer>
            </div>
        </dialog>

        <dialog class="vd-dialog vd-dialog-wide related-asset-requests-dialog" onclose={handleRelatedDialogClose}>
            <div class="vd-backdrop" onclick={handleCloseRelatedAssetRequestsModal}></div>
            <div class="vd-shell">
                <header class="vd-header">
                    <div class="vd-title-row">
                        <span class="vd-badge">Asset Requests</span>
                        <h2 class="vd-title">All Asset Requests</h2>
                    </div>
                    <button class="vd-close-btn" type="button" onclick={handleCloseRelatedAssetRequestsModal} aria-label="Close">&#10005;</button>
                </header>
                <div class="vd-body">
                    <template if:true={hasAllRelatedAssetRequests}>
                        <div class="table-wrap table-wrap--flush">
                            <table class="summary">
                                <thead><tr><th>Request</th><th>Product</th><th>Type</th><th>Status</th><th>Requested Install</th><th>Created</th></tr></thead>
                                <tbody>
                                    <template for:each={allAssetRequests} for:item="item">
                                        <tr key={item.rowKey} class="order-row-clickable" data-id={item.requestId} onclick={handleRelatedAssetRequestClick}>
                                            <td class="order-name-cell">{item.requestNumber}</td>
                                            <td>{item.productName}</td>
                                            <td>{item.requestType}</td>
                                            <td>{item.status}</td>
                                            <td>{item.requestedInstallationDateLabel}</td>
                                            <td>{item.createdDateLabel}</td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>
                </div>
                <footer class="vd-footer">
                    <button class="vd-btn-secondary" type="button" onclick={handleCloseRelatedAssetRequestsModal}>Close</button>
                </footer>
            </div>
        </dialog>

        <c-order-detail onclose={handleOrderDetailClose}></c-order-detail>
        <c-asset-detail visit-id={currentVisitId} onauditcreated={handleAssetAuditCreated}></c-asset-detail>
        <c-asset-request-detail></c-asset-request-detail>
        <c-asset-request-form
            visit-id={currentVisitId}
            account-id={outletRecordId}
            account-name={outletName}
            onrequestsubmitted={handleAssetRequestSubmitted}>
        </c-asset-request-form>

    </section>
</template>
