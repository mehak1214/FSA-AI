<template>
    <section class="page" role="dialog" aria-modal="true">

        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="large" variant="brand"></lightning-spinner>
        </template>

        <div class="sheet">
            <!-- Hero / Header -->
            <div class="hero">

                <!-- Row 1: Back + Status badge + Outlet photo -->
                <div class="hero-top">
                    <button class="back-btn" onclick={handleClose} title="Back">&#8592;</button>
                    <div class="hero-top-right">
                        <span class={statusBadgeClass}>{visitStatus}</span>
                        <template if:true={hasOutletPhoto}>
                            <div class="hero-thumb">
                                <img src={outletPhotoUrl} alt="Outlet photo" />
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Row 2: Eyebrow — visit name + sequence -->
                <p class="hero-eyebrow">
                    <span class="hero-eyebrow-name">{visitName}</span>
                    <template if:true={sequenceLabel}>
                        <span class="hero-eyebrow-seq"> · Visit #{sequenceLabel}</span>
                    </template>
                </p>

                <!-- Row 3: Outlet name (tappable) -->
                <h2 class="hero-outlet-name">
                    <button type="button" class="outlet-link" onclick={handleOpenOutlet360}
                        disabled={outletLinkDisabled} title="Open Outlet 360">
                        {outletName}
                    </button>
                </h2>

                <!-- Row 4: Phone -->
                <template if:true={outletPhone}>
                    <div class="hero-detail-row">
                        <a href="tel:{outletPhone}" class="hero-detail-item hero-detail-link">&#128222; {outletPhone}</a>
                    </div>
                </template>

                <!-- Row 5: Address -->
                <template if:true={hasAddress}>
                    <p class="hero-address">&#128205; {outletAddress}</p>
                </template>

                <!-- Row 6: Directions button -->
                <div class="hero-actions">
                    <button class="map-mini-btn" onclick={navigateToMap} type="button" disabled={mapDisabled}
                        title="Directions">
                        <lightning-icon icon-name="utility:location" size="x-small"></lightning-icon>
                        <span class="map-mini-label">Directions</span>
                    </button>
                </div>

            </div>

            <div class="content">
                <!-- Visit Timing -->
                <div class="card">
                    <div class="card-head">
                        <span class="card-title">Timing</span>
                    </div>
                    <div class="detail-grid">
                        <div class="detail">
                            <p class="label">Planned Window</p>
                            <p class="value">{plannedStart} - {plannedEnd}</p>
                        </div>
                        <div class="detail">
                            <p class="label">Check-in / out</p>
                            <p class="value">{checkInTime} - {checkOutTime}</p>
                        </div>
                        <div class="detail">
                            <p class="label">Duration</p>
                            <p class="value">{duration}</p>
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="card">
                    <div class="card-head">
                        <span class="card-title">Actions</span>
                    </div>
                    <div class="action-grid">
                        <template if:true={actionInFlight}>
                            <div class="action-helper">Grabbing GPS...</div>
                        </template>
                        <template if:true={showCheckIn}>
                            <button class="btn success action-main" onclick={handleCheckIn} type="button"
                                disabled={actionInFlight}>
                                <span>Check In</span>
                            </button>
                        </template>

                        <template if:true={showCheckOut}>
                            <button class="btn danger action-main" onclick={handleCheckOut} type="button"
                                disabled={actionInFlight}>
                                <span>Check Out</span>
                            </button>
                        </template>

                        <template if:true={showDayCompletedMessage}>
                            <div class="day-completed-message">
                                Day already completed.
                            </div>
                        </template>

                        <template if:true={showStartDayMessage}>
                            <div class="start-day-message">
                                To check-in, start your day first.
                            </div>
                        </template>

                        <template if:true={hasVisitPhoto}>
                            <button class="btn secondary action-photo" onclick={handleOpenPhotoModal} type="button"
                                title="Preview Visit Photo">
                                <span>Preview Photo</span>
                            </button>
                        </template>

                        <template if:false={hasVisitPhoto}>
                            <button class="btn primary action-photo" onclick={handleTakePhoto} type="button">
                                <span>Take Photo</span>
                            </button>
                        </template>

                        <button class="btn primary action-order" onclick={handleToggleOrderPanel} type="button">
                            <span>{orderToggleLabel}</span>
                        </button>

                        <button class="btn secondary action-orders" onclick={handleOpenOrdersModal} type="button">
                            <span>View Order</span>
                        </button>

                        <button class="btn secondary action-orders" onclick={handleOpenSchemesModal} type="button">
                            <span>Schemes</span>
                        </button>

                    </div>
                </div>

                <!-- Tasks -->
                <template if:true={showTasksCard}>
                    <div class="card">
                        <div class="card-head">
                            <span class="card-title">Tasks</span>
                            <span class="task-count-badge">{taskCountLabel}</span>
                        </div>
                        <template if:true={isLoadingTasks}>
                            <lightning-spinner alternative-text="Loading tasks" size="small" variant="brand"></lightning-spinner>
                        </template>
                        <template if:false={isLoadingTasks}>
                            <template if:true={hasTasks}>
                                <div class="task-list">
                                    <template for:each={decoratedTasks} for:item="task">
                                        <div key={task.Id} class={task.itemClass}>

                                            <!-- Always-visible header row -->
                                            <div class="task-header" data-id={task.Id} onclick={handleTaskToggle}>
                                                <div class="task-left">
                                                    <div class="task-badges">
                                                        <span class={task.statusBadgeClass}>{task.Status__c}</span>
                                                        <template if:true={task.Is_Mandatory__c}>
                                                            <span class="task-mandatory-badge">Mandatory</span>
                                                        </template>
                                                    </div>
                                                    <p class="task-type">{task.Task_Type__c}</p>
                                                    <p class="task-id">{task.Name}</p>
                                                </div>
                                                <span class="task-chevron">{task.chevron}</span>
                                            </div>

                                            <!-- Expanded body -->
                                            <template if:true={task.isExpanded}>
                                                <div class="task-body">
                                                    <div class="task-detail-row">
                                                        <span class="task-detail-label">Asset</span>
                                                        <span class="task-detail-value">{task.assetName}</span>
                                                    </div>

                                                    <template if:true={task.hasInstructions}>
                                                        <div class="task-instructions-box">
                                                            <p class="task-detail-label">Manager instructions</p>
                                                            <p class="task-instructions-text">{task.Manager_Instructions__c}</p>
                                                        </div>
                                                    </template>

                                                    <template if:true={task.isBlocked}>
                                                        <div class="task-exception-box">
                                                            <p class="task-detail-label">Block reason</p>
                                                            <p class="task-exception-text">{task.Exception_Reason__c}</p>
                                                        </div>
                                                    </template>

                                                    <template if:true={task.isPending}>
                                                        <div class="task-action-row">
                                                            <button
                                                                class="task-btn task-btn--complete"
                                                                data-id={task.Id}
                                                                onclick={handleCompleteTask}
                                                                disabled={isActingOnTask}>
                                                                ✓ Mark complete
                                                            </button>
                                                            <button
                                                                class="task-btn task-btn--block"
                                                                data-id={task.Id}
                                                                onclick={handleOpenBlockDialog}>
                                                                Block
                                                            </button>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>

                                        </div>
                                    </template>
                                </div>
                            </template>
                            <template if:false={hasTasks}>
                                <p class="task-empty">No tasks assigned for this visit.</p>
                            </template>
                        </template>
                    </div>
                </template>

                <div class="card">
                    <div class="card-head with-actions">
                        <span class="card-title">Meeting Notes</span>
                        <button class="btn secondary notes-save-btn" onclick={handleSaveMeetingNotes} type="button"
                            disabled={meetingNotesSaving}>
                            Save Notes
                        </button>
                    </div>
                    <lightning-textarea label="Visit Discussion" value={meetingNotes}
                        onchange={handleMeetingNotesChange}
                        placeholder="Add meeting summary, commitments, next steps...">
                    </lightning-textarea>

                    <div class="notes-upload">
                        <lightning-file-upload label="Attach files to this visit" record-id={currentVisitId} multiple
                            onuploadfinished={handleVisitFileUploadFinished}>
                        </lightning-file-upload>
                    </div>
                </div>

                <!-- Rating & Feedback -->
                <template if:true={showRatingFeedback}>
                    <div class="card">
                        <div class="card-head">
                            <span class="card-title">Rating &amp; Feedback</span>
                            <template if:true={ratingFeedbackSaved}>
                                <span class="pill success">&#10003; Saved</span>
                            </template>
                        </div>

                        <!-- 5-Star Rating -->
                        <div class="rating-row">
                            <p class="label">Rate this visit</p>
                            <div class="star-group">
                                <template for:each={starList} for:item="star">
                                    <button
                                        key={star.value}
                                        type="button"
                                        class={star.cssClass}
                                        data-value={star.value}
                                        onclick={handleStarClick}
                                        title={star.label}
                                        aria-label={star.label}>
                                        &#9733;
                                    </button>
                                </template>
                            </div>
                        </div>

                        <!-- Feedback Text Area -->
                        <div class="rating-feedback-area">
                            <lightning-textarea
                                label="Feedback"
                                value={visitFeedback}
                                onchange={handleFeedbackChange}
                                placeholder="Share your feedback about this visit...">
                            </lightning-textarea>
                        </div>

                        <div class="rating-actions">
                            <template if:false={ratingFeedbackSaved}>
                                <p class="checkout-warning">&#9888; Save rating &amp; feedback to enable Check Out.</p>
                            </template>
                            <button
                                class="btn primary notes-save-btn"
                                onclick={handleSaveRatingFeedback}
                                type="button"
                                disabled={ratingFeedbackSaving}>
                                <lightning-icon icon-name="utility:save" size="x-small"></lightning-icon>
                                <template if:true={ratingFeedbackSaving}>
                                    <span>Saving...</span>
                                </template>
                                <template if:false={ratingFeedbackSaving}>
                                    <span>Save Rating &amp; Feedback</span>
                                </template>
                            </button>
                        </div>
                    </div>
                </template>

            </div>

        </div>
        <!-- END .sheet — modals are intentionally outside the scrollable sheet
             so they stay fixed to the viewport on mobile -->

        <!-- Block-task dialog -->
        <dialog class="vd-dialog block-task-dialog" onclose={handleBlockDialogClose}>
            <div class="vd-backdrop" onclick={handleCloseBlockDialog}></div>
            <div class="vd-shell">
                <header class="vd-header">
                    <div class="vd-title-row">
                        <span class="vd-badge">Task</span>
                        <h2 class="vd-title">Block task</h2>
                    </div>
                    <button class="vd-close-btn" type="button" onclick={handleCloseBlockDialog} aria-label="Close">&#10005;</button>
                </header>
                <div class="vd-body">
                    <template if:true={blockingTask}>
                        <p class="block-task-name">{blockingTask.Task_Type__c}</p>
                        <p class="block-task-sub">{blockingTask.Name}</p>
                        <div class="block-reason-wrap">
                            <lightning-textarea
                                label="Reason for blocking"
                                value={blockReason}
                                onchange={handleBlockReasonChange}
                                placeholder="Describe why the retailer refused or what is blocking this task..."
                                rows="4"
                                required>
                            </lightning-textarea>
                        </div>
                    </template>
                </div>
                <footer class="vd-footer">
                    <button class="vd-btn-secondary" type="button" onclick={handleCloseBlockDialog}>Cancel</button>
                    <button class="vd-btn-danger" type="button" onclick={handleConfirmBlock} disabled={isActingOnTask}>
                        <template if:true={isActingOnTask}>Saving...</template>
                        <template if:false={isActingOnTask}>Confirm block</template>
                    </button>
                </footer>
            </div>
        </dialog>

        <!-- Photo modal -->
        <dialog class="vd-dialog photo-dialog" onclose={handleClosePhotoModal}>
            <div class="vd-backdrop" onclick={handleClosePhotoModal}></div>
            <div class="vd-shell">
                <header class="vd-header">
                    <div class="vd-title-row">
                        <span class="vd-badge">Visit</span>
                        <h2 class="vd-title">Visit Photo</h2>
                    </div>
                    <button class="vd-close-btn" type="button" onclick={handleClosePhotoModal} aria-label="Close">&#10005;</button>
                </header>
                <div class="vd-body">
                    <template if:true={hasVisitPhoto}>
                        <img src={imageUrl} alt="Visit Photo" class="photo-preview" />
                    </template>
                    <template if:false={hasVisitPhoto}>
                        <div class="vd-empty">No photo available.</div>
                    </template>
                </div>
                <footer class="vd-footer">
                    <button class="vd-btn-secondary" type="button" onclick={handleClosePhotoModal}>Close</button>
                    <button class="vd-btn-danger" type="button" onclick={handleDeletePhoto}>Delete Photo</button>
                </footer>
            </div>
        </dialog>

        <!-- Schemes modal -->
        <dialog class="vd-dialog vd-dialog-wide schemes-dialog" onclose={handleSchemesDialogClose}>
            <div class="vd-backdrop" onclick={handleCloseSchemesModal}></div>
            <div class="vd-shell">
                <header class="vd-header">
                    <div class="vd-title-row">
                        <span class="vd-badge">Schemes</span>
                        <h2 class="vd-title">Schemes</h2>
                    </div>
                    <button class="vd-close-btn" type="button" onclick={handleCloseSchemesModal} aria-label="Close">&#10005;</button>
                </header>
                <div class="vd-body vd-body-flush">
                    <c-view-schemes></c-view-schemes>
                </div>
                <footer class="vd-footer">
                    <button class="vd-btn-secondary" type="button" onclick={handleCloseSchemesModal}>Close</button>
                </footer>
            </div>
        </dialog>

        <!-- Order modal -->
        <dialog class="vd-dialog vd-dialog-wide order-dialog" onclose={handleOrderDialogClose}>
            <div class="vd-backdrop" onclick={handleToggleOrderPanel}></div>
            <div class="vd-shell">
                <header class="vd-header">
                    <div class="vd-title-row">
                        <span class="vd-badge">Order</span>
                        <h2 class="vd-title">Create Order</h2>
                    </div>
                    <button class="vd-close-btn" type="button" onclick={handleToggleOrderPanel} aria-label="Close">&#10005;</button>
                </header>
                <div class="vd-body vd-body-flush">
                    <c-place-order franchise-id={visitFranchiseId} visit-id={currentVisitId} onordercreated={handleOrderCreated}>
                    </c-place-order>
                </div>
                <footer class="vd-footer">
                    <button class="vd-btn-secondary" type="button" onclick={handleToggleOrderPanel}>Close</button>
                </footer>
            </div>
        </dialog>

        <!-- Orders View dialog -->
        <dialog class="vd-dialog vd-dialog-wide orders-dialog" onclose={handleOrdersDialogClose}>
            <div class="vd-backdrop" onclick={handleCloseOrdersModal}></div>
            <div class="vd-shell">
                <header class="vd-header">
                    <div class="vd-title-row">
                        <span class="vd-badge">Orders</span>
                        <h2 class="vd-title">My Orders</h2>
                    </div>
                    <button class="vd-close-btn" type="button" onclick={handleCloseOrdersModal} aria-label="Close">&#10005;</button>
                </header>
                <div class="vd-body vd-body-flush">
                    <c-orders-by-user visit-franchise-id={visitFranchiseId} onorderselected={handleOrderSelected}></c-orders-by-user>
                </div>
                <footer class="vd-footer">
                    <button class="vd-btn-secondary" type="button" onclick={handleCloseOrdersModal}>Close</button>
                </footer>
            </div>
        </dialog>

        <!-- orderDetail popup — opens when an order card is tapped -->
        <c-order-detail onclose={handleOrderDetailClose}></c-order-detail>

    </section>
</template>
