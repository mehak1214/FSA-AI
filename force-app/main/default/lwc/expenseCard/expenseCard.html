<template>
    <div class={cardClass} onclick={handleCardClick}>

        <!-- Top row: type icon + type label + amount -->
        <div class="card-header">
            <div class="type-pill">
                <lightning-icon
                    icon-name={typeIcon}
                    size="x-small"
                    class="type-icon">
                </lightning-icon>
                <span class="type-label">{expense.expenseType}</span>
            </div>
            <span class="amount">{formattedAmount}</span>
        </div>

        <!-- Middle row: date + report badge -->
        <div class="card-meta">
            <span class="meta-date">
                <lightning-icon icon-name="utility:event" size="xx-small" class="meta-icon"></lightning-icon>
                {formattedDate}
            </span>
            <template lwc:if={expense.expenseReportName}>
                <span class="report-badge">
                    <lightning-icon icon-name="utility:file" size="xx-small" class="meta-icon"></lightning-icon>
                    {expense.expenseReportName}
                </span>
            </template>
            <template lwc:if={expense.visitName}>
                <span class="visit-badge">
                    <lightning-icon icon-name="utility:location" size="xx-small" class="meta-icon"></lightning-icon>
                    {expense.visitName}
                </span>
            </template>
        </div>

        <!-- Description (truncated) -->
        <template lwc:if={expense.description}>
            <p class="card-desc">{truncatedDescription}</p>
        </template>

        <!-- Rejection reason (only for Rejected expenses) -->
        <template lwc:if={isRejected}>
            <div class="card-rejection">
                <lightning-icon icon-name="utility:error" size="xx-small" class="rejection-icon"></lightning-icon>
                <span class="rejection-text">{rejectionReasonDisplay}</span>
            </div>
        </template>

        <!-- Bottom row: status badge + actions -->
        <div class="card-footer">
            <span class={statusBadgeClass}>{expense.status}</span>
            <template lwc:if={isDraft}>
                <div class="card-actions" onclick={stopPropagation}>
                    <button class="btn-submit-expense" onclick={handleSubmit}>
                        Submit
                    </button>
                    <lightning-button-icon
                        icon-name="utility:delete"
                        variant="bare"
                        size="small"
                        alternative-text="Delete"
                        class="delete-btn"
                        onclick={handleDelete}>
                    </lightning-button-icon>
                </div>
            </template>
        </div>

    </div>
</template>
