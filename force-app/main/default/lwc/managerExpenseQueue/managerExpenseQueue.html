<template>
    <div class="queue-container">

        <!-- ── DETAIL VIEW ── -->
        <template lwc:if={selectedReportId}>
            <c-manager-expense-detail
                report-id={selectedReportId}
                onback={handleBack}
                onreportprocessed={handleReportProcessed}>
            </c-manager-expense-detail>
        </template>

        <!-- ── QUEUE LIST VIEW ── -->
        <template lwc:else>

            <!-- Header card -->
            <div class="header">
                <div class="header-left">
                    <div>
                        <h1 class="header-title">Expense Approvals</h1>
                        <p class="header-subtitle">Manager Dashboard</p>
                    </div>
                </div>
                <div class="header-right">
                    <div class="header-stats">
                        <div class="stat-pill pill-pending">
                            <span class="stat-count">{totalPending}</span>
                            <span class="stat-label">Pending</span>
                        </div>
                        <div class="stat-pill pill-expenses">
                            <span class="stat-count">{totalExpenses}</span>
                            <span class="stat-label">Expenses</span>
                        </div>
                        <div class="stat-pill pill-amount">
                            <span class="stat-count">{formattedTotalAmount}</span>
                            <span class="stat-label">Total</span>
                        </div>
                    </div>
                    <button class="refresh-btn" onclick={handleRefresh} title="Refresh">&#8635; Refresh</button>
                </div>
            </div>

            <!-- Smart filter bar -->
            <div class="smart-bar">

                <lightning-icon icon-name="utility:search" size="xx-small" class="sb-search-icon"></lightning-icon>

                <template for:each={activeChips} for:item="chip">
                    <span key={chip.key} class="sb-chip">
                        <lightning-icon icon-name={chip.icon} size="xx-small" class="sb-chip-icon"></lightning-icon>
                        <span class="sb-chip-label">{chip.label}</span>
                        <button class="sb-chip-remove" data-key={chip.key} onclick={handleRemoveChip} title="Remove">
                            <lightning-icon icon-name="utility:close" size="xx-small"></lightning-icon>
                        </button>
                    </span>
                </template>

                <template lwc:if={showRepSearch}>
                    <div class="sb-input-wrap">
                        <input
                            type="text"
                            class="sb-input"
                            placeholder={searchPlaceholder}
                            value={repSearchText}
                            oninput={handleSearchInput}
                            onfocus={handleSearchFocus}
                            onblur={handleSearchBlur}
                            autocomplete="off" />
                        <template lwc:if={showSuggestions}>
                            <div class="sb-suggestions">
                                <div class="sb-suggestions-header">Select a rep</div>
                                <template for:each={filteredRepOptions} for:item="rep">
                                    <button key={rep.id} class="sb-suggestion-item"
                                        data-id={rep.id} data-name={rep.name}
                                        onclick={handleRepSelect}>
                                        <lightning-icon icon-name="utility:person_account" size="xx-small"></lightning-icon>
                                        {rep.name}
                                    </button>
                                </template>
                            </div>
                        </template>
                    </div>
                </template>

                <template lwc:if={showDatePicker}>
                    <div class="sb-date-wrap">
                        <lightning-icon icon-name="utility:event" size="xx-small" class="sb-date-icon"></lightning-icon>
                        <input type="date" class="sb-date" value={filterDate}
                            onchange={handleDateChange} title="Filter by report date" />
                    </div>
                </template>

                <span class="sb-spacer"></span>
                <span class="sb-count">{resultCountLabel}</span>

                <template lwc:if={isFiltered}>
                    <button class="sb-clear" onclick={handleClearAll} title="Clear all filters">
                        <lightning-icon icon-name="utility:close" size="xx-small"></lightning-icon>
                        Clear
                    </button>
                </template>

            </div>

            <!-- Loading -->
            <template lwc:if={isLoading}>
                <div class="spinner-container">
                    <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                </div>
            </template>

            <!-- Error -->
            <template lwc:elseif={hasError}>
                <div class="empty-state">
                    <div class="empty-icon">⚠️</div>
                    <p class="empty-title">Something went wrong</p>
                    <p class="empty-sub">{errorMessage}</p>
                    <button class="retry-btn" onclick={handleRefresh}>Retry</button>
                </div>
            </template>

            <!-- Empty queue -->
            <template lwc:elseif={isEmpty}>
                <div class="empty-state">
                    <div class="empty-icon">✅</div>
                    <p class="empty-title">All caught up!</p>
                    <p class="empty-sub">No expense reports are pending your approval.</p>
                </div>
            </template>

            <!-- Empty after filter -->
            <template lwc:elseif={isFilteredEmpty}>
                <div class="empty-state">
                    <div class="empty-icon">🔍</div>
                    <p class="empty-title">No results</p>
                    <p class="empty-sub">No reports match the active filters. Try adjusting or clearing them.</p>
                </div>
            </template>

            <!-- Report cards — grouped by sales rep -->
            <template lwc:else>
                <template for:each={groupedReports} for:item="group">
                    <div key={group.groupKey} class="rep-group">

                        <!-- Group header — click to expand/collapse -->
                        <div class={group.headerClass} data-repid={group.repId} onclick={handleGroupToggle}>
                            <div class="rep-group-left">
                                <div class="rep-avatar">{group.avatarLetter}</div>
                                <div class="rep-group-info">
                                    <span class="rep-group-name">{group.repName}</span>
                                    <span class="rep-group-meta">{group.reportLabel} &middot; {group.formattedTotal}</span>
                                </div>
                            </div>
                            <div class="rep-group-right">
                                <template lwc:if={group.totalPending}>
                                    <span class="rep-pending-badge">{group.totalPending} pending</span>
                                </template>
                                <span class="rep-chevron">{group.chevron}</span>
                            </div>
                        </div>

                        <!-- Cards inside this group — only when expanded -->
                        <template lwc:if={group.isExpanded}>
                        <div class="cards-grid">
                            <template for:each={group.reports} for:item="rpt">
                                <div key={rpt.id} class="report-card" data-id={rpt.id} onclick={handleReportClick}>

                                    <div class="card-hint">Click to view details</div>

                                    <div class="card-top">
                                        <div class="card-info">
                                            <p class="report-name">{rpt.name}</p>
                                        </div>
                                        <span class={rpt.statusClass}>{rpt.status}</span>
                                        <span class="report-amount">{rpt.formattedAmount}</span>
                                    </div>

                                    <div class="card-meta">
                                        <div class="meta-item">
                                            <span class="meta-icon">📅</span>
                                            <span>{rpt.formattedDate}</span>
                                        </div>
                                        <div class="meta-item">
                                            <span class="meta-icon">🧾</span>
                                            <span>{rpt.expenseCount} expense(s)</span>
                                        </div>
                                        <template lwc:if={rpt.submittedCount}>
                                            <div class="meta-item">
                                                <span class="meta-icon">⏳</span>
                                                <span>{rpt.submittedCount} pending</span>
                                            </div>
                                        </template>
                                        <template lwc:if={rpt.hasBreach}>
                                            <span class="breach-badge">
                                                <lightning-icon icon-name="utility:warning" size="xx-small"></lightning-icon>
                                                {rpt.breachLabel}
                                            </span>
                                        </template>
                                    </div>

                                    <div class="card-footer">
                                        <span class="card-counts">{rpt.expenseCount} expense(s)
                                            <template lwc:if={rpt.submittedCount}>
                                                &middot; <strong>{rpt.submittedCount} pending</strong>
                                            </template>
                                        </span>
                                        <span class="card-open-hint">
                                            View Details
                                            <lightning-icon icon-name="utility:forward" size="xx-small"></lightning-icon>
                                        </span>
                                    </div>

                                </div>
                            </template>
                        </div>
                        </template>

                    </div>
                </template>
            </template>

        </template>

        <!-- Toast -->
        <template if:true={showToast}>
            <div class={toastClass}>
                <span>{toastMessage}</span>
            </div>
        </template>

    </div>
</template>
