<template>
    <div class="container">
        <div class="main-card">
            <div class="cards-wrapper">
                <template if:true={displayProducts}>
                    <template for:each={displayProducts} for:item="product" for:index="index">
                        <div key={product.Id} class={product.cardClass} data-product-id={product.Id}>
                            <div class="card-content">
                                <template if:true={product.isOverflow}>
                                    <button class="slds-button slds-button_neutral slds-button_small" onclick={handleOpenModal} title="View all products">
                                        View All
                                    </button>
                                </template>
                                <template if:false={product.isOverflow}>
                                    <div class="card-info">
                                        <div class="card-image-container">
                                            <template if:true={product.imageUrl}>
                                                <img src={product.imageUrl} alt={product.Name} class="card-product-image">
                                            </template>
                                            <template if:false={product.imageUrl}>
                                                <div class="no-card-image">
                                                    <lightning-icon icon-name="standard:product" size="x-small"></lightning-icon>
                                                </div>
                                            </template>
                                        </div>
                                        <p class="card-product-name">{product.Name}</p>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </template>
                
                <template if:false={displayProducts}>
                    <p class="no-products">No new products available</p>
                </template>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <template if:true={isModalOpen}>
        <div class="modal-layer">
            <div class="modal-backdrop" onclick={handleCloseModal}></div>
            <section role="dialog" tabindex="-1" aria-modal="true" aria-label="All New Products" class="modal-dialog" lwc:ref="productsModal">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">All New Products</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium products-modal-content">
                        <template if:true={allProducts}>
                            <div class="products-list">
                                <template for:each={allProducts} for:item="product">
                                    <div class="product-list-item" key={product.Id} data-product-id={product.Id} onclick={handleProductCardClick}>
                                        <div class="product-list-image-wrap">
                                            <template if:true={product.imageUrl}>
                                                <img src={product.imageUrl} alt={product.Name} class="product-list-image" />
                                            </template>
                                            <template if:false={product.imageUrl}>
                                                <div class="product-list-no-image">
                                                    <lightning-icon icon-name="standard:product" size="x-small"></lightning-icon>
                                                </div>
                                            </template>
                                        </div>
                                        <div class="product-list-info">
                                            <div class="product-list-name">{product.Name}</div>
                                            <template if:true={product.ProductCode}>
                                                <div class="product-list-meta">{product.ProductCode}</div>
                                            </template>
                                            <template if:true={product.Family}>
                                                <div class="product-list-meta">{product.Family}</div>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="btn secondary" onclick={handleCloseModal} type="button">Close</button>
                    </footer>
                </div>
            </section>
        </div>
    </template>

    <!-- Product Detail Modal -->
    <template if:true={isProductDetailModalOpen}>
        <div class="modal-layer">
            <div class="modal-backdrop" onclick={handleCloseProductDetailModal}></div>
            <section role="dialog" tabindex="-1" aria-modal="true" aria-label="Product Details" class="modal-dialog" lwc:ref="detailModal">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">Product Details</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium product-detail-content">
                        <template if:true={selectedProduct}>
                            <div class="detail-card">
                                <template if:true={selectedProduct.imageUrl}>
                                    <div class="detail-product-img-wrap">
                                        <img src={selectedProduct.imageUrl} alt={selectedProduct.Name} class="detail-product-img" />
                                    </div>
                                </template>
                                <template if:false={selectedProduct.imageUrl}>
                                    <div class="detail-product-no-img">
                                        <lightning-icon icon-name="standard:product" size="large"></lightning-icon>
                                        <p>No Image Available</p>
                                    </div>
                                </template>
                                <div class="detail-card-head">
                                    <span class="detail-card-title">{selectedProduct.Name}</span>
                                </div>
                                <div class="detail-grid">
                                    <template if:true={selectedProduct.ProductCode}>
                                        <div class="detail-row">
                                            <span class="detail-label">Code</span>
                                            <span class="detail-value">{selectedProduct.ProductCode}</span>
                                        </div>
                                    </template>
                                    <template if:true={selectedProduct.Family}>
                                        <div class="detail-row">
                                            <span class="detail-label">Family</span>
                                            <span class="detail-value">{selectedProduct.Family}</span>
                                        </div>
                                    </template>
                                </div>
                                <template if:true={selectedProduct.Description}>
                                    <div class="detail-description-box">
                                        <span class="detail-label">Description</span>
                                        <p class="detail-description-text">{selectedProduct.Description}</p>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="btn secondary" onclick={handleCloseProductDetailModal} type="button">Close</button>
                    </footer>
                </div>
            </section>
        </div>
    </template>
</template>
