<template>
    <div class="obu-page">

        <!-- ── Tab strip ── -->
        <div class="obu-tab-wrap">
            <div class="obu-tab-bar">
                <button class={allTabClass}     data-tab="ALL"     onclick={handleTabChange} type="button">All</button>
                <button class={sampleTabClass}  data-tab="SAMPLE"  onclick={handleTabChange} type="button">Sample</button>
                <button class={regularTabClass} data-tab="REGULAR" onclick={handleTabChange} type="button">Regular</button>
            </div>
        </div>

        <!-- ── Loading ── -->
        <template if:true={isLoading}>
            <div class="obu-spinner-wrap">
                <lightning-spinner alternative-text="Loading orders" size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- ── Error ── -->
        <template if:true={errorMessage}>
            <div class="obu-error">{errorMessage}</div>
        </template>

        <!-- ── Empty ── -->
        <template if:true={noOrdersToDisplay}>
            <div class="obu-empty">No orders found.</div>
        </template>

        <!-- ── Order cards ── -->
        <template if:true={hasOrders}>
            <div class="obu-list">
                <template for:each={visibleOrders} for:item="order">
                    <div key={order.orderId}
                         class="obu-card"
                         data-order-id={order.orderId}
                         onclick={handleCardClick}>

                        <div class="obu-card-top">
                            <div class="obu-card-left">
                                <span class="obu-order-num">#{order.orderNumber}</span>
                                <span class="obu-order-type">{order.orderType}</span>
                            </div>
                            <span class={order.statusClass}>{order.status}</span>
                        </div>

                        <div class="obu-card-meta">
                            <span class="obu-meta-chip">&#128197; {order.formattedOrderDate}</span>
                            <span class="obu-meta-chip">&#8377; {order.formattedAmount}</span>
                            <span class="obu-meta-chip">&#128230; {order.productCount} items</span>
                        </div>

                    </div>
                </template>
            </div>
        </template>

    </div>
</template>
