<template>
    <div class="fab-portal">

        <button class="fab" title="Add Expense">
            <lightning-icon icon-name="utility:add" size="small" class="fab-icon"></lightning-icon>
        </button>

        <template lwc:if={isModalOpen}>
            <div class="modal-backdrop"></div>
            <div class="modal-sheet" role="dialog" aria-modal="true" aria-label="Add Expense">
                <div class="sheet-handle"></div>

                <div class="sheet-header">
                    <h2 class="sheet-title">Add Expense</h2>
                    <button class="close-btn" onclick={closeModal}>&#10005;</button>
                </div>

                <div class="sheet-body">

                    <!-- Amount -->
                    <div class="form-group">
                        <label class="form-label required-label">Amount (&#8377;)</label>
                        <div class="amount-input-wrap">
                            <span class="currency-symbol">&#8377;</span>
                            <input type="number" class="form-input amount-input"
                                placeholder="0.00" min="0" step="0.01"
                                data-field="amount" value={formData.amount}
                                oninput={handleInput} />
                        </div>
                        <template lwc:if={errors.amount}>
                            <span class="field-error">{errors.amount}</span>
                        </template>
                    </div>

                    <!-- Expense Type -->
                    <div class="form-group">
                        <label class="form-label required-label">Expense Type</label>
                        <div class="select-wrap">
                            <select class="form-select" data-field="expenseType" onchange={handleInput}>
                                <option value="">-- Select Type --</option>
                                <template for:each={expenseTypeOptions} for:item="opt">
                                    <option key={opt.value} value={opt.value} selected={opt.selected}>{opt.label}</option>
                                </template>
                            </select>
                        </div>
                        <template lwc:if={errors.expenseType}>
                            <span class="field-error">{errors.expenseType}</span>
                        </template>
                    </div>

                    <!-- Date -->
                    <div class="form-group">
                        <label class="form-label required-label">Expense Date</label>
                        <input type="date" class="form-input"
                            data-field="expenseDate" value={formData.expenseDate}
                            oninput={handleInput} />
                        <template lwc:if={errors.expenseDate}>
                            <span class="field-error">{errors.expenseDate}</span>
                        </template>
                    </div>

                    <!-- Description -->
                    <div class="form-group">
                        <label class="form-label">Description <span class="optional">(optional)</span></label>
                        <textarea class="form-textarea" placeholder="Enter notes or description…"
                            data-field="description" oninput={handleInput} rows="3">{formData.description}</textarea>
                    </div>

                    <!-- Link Visits -->
                    <div class="form-group">
                        <label class="form-label">Link Visits <span class="optional">(optional)</span></label>

                        <template lwc:if={visitsLoading}>
                            <div class="visits-loading">
                                <div class="visits-spinner"></div>
                                <span>Loading visits…</span>
                            </div>
                        </template>

                        <template lwc:elseif={visitsLoadError}>
                            <p class="visits-empty">Could not load visits. Check your connection.</p>
                        </template>

                        <template lwc:elseif={hasVisits}>
                            <div class="visit-list">
                                <template for:each={availableVisits} for:item="visit">
                                    <div key={visit.id}
                                         class="visit-row"
                                         data-id={visit.id}
                                         onclick={handleVisitToggle}>
                                        <div class="visit-check-wrap">
                                            <div class={visit.checkClass}>
                                                <template lwc:if={visit.selected}>&#10003;</template>
                                            </div>
                                        </div>
                                        <div class="visit-info">
                                            <span class="visit-name">{visit.name}</span>
                                            <span class="visit-outlet">{visit.outletName}</span>
                                        </div>
                                    </div>
                                </template>
                            </div>
                            <template lwc:if={selectedVisitCount}>
                                <p class="visits-selected-hint">{selectedVisitCount} visit(s) selected</p>
                            </template>
                        </template>

                        <template lwc:elseif={noVisitsForDate}>
                            <p class="visits-empty">No visits found for this date.</p>
                        </template>
                    </div>

                    <!-- Receipts / Attachments -->
                    <div class="form-group">
                        <label class="form-label">Receipts / Documents <span class="optional">(optional)</span></label>

                        <!-- Hidden file input -->
                        <input type="file" class="file-input"
                            accept="image/*,.pdf"
                            multiple
                            onchange={handleFileChange} />

                        <!-- Upload tap area -->
                        <div class="upload-area" onclick={triggerFilePicker}>
                            <lightning-icon icon-name="utility:upload" size="small" class="upload-icon"></lightning-icon>
                            <span class="upload-text">Tap to upload receipts</span>
                            <span class="upload-hint">Images or PDF · Max 5 MB each</span>
                        </div>

                        <!-- Attached file chips -->
                        <template lwc:if={hasFiles}>
                            <div class="file-list">
                                <template for:each={enrichedFiles} for:item="file">
                                    <div key={file.id} class="file-chip">
                                        <template lwc:if={file.previewUrl}>
                                            <img src={file.previewUrl} class="file-thumb" alt={file.name} />
                                        </template>
                                        <template lwc:else>
                                            <div class="file-thumb file-thumb-pdf">
                                                <lightning-icon icon-name="doctype:pdf" size="small"></lightning-icon>
                                            </div>
                                        </template>
                                        <div class="file-info">
                                            <span class="file-name">{file.name}</span>
                                            <span class="file-size">{file.formattedSize}</span>
                                        </div>
                                        <button class="file-remove" data-id={file.id} onclick={removeFile} title="Remove">&#10005;</button>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>

                </div>

                <div class="sheet-footer">
                    <button class="btn-cancel" onclick={closeModal}>Cancel</button>
                    <button class="btn-save" onclick={handleSave} disabled={isSaving}>
                        <template lwc:if={isSaving}>Saving…</template>
                        <template lwc:else>Save Expense</template>
                    </button>
                </div>
            </div>
        </template>

    </div>
</template>
