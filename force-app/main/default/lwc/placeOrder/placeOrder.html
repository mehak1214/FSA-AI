<template>
    <lightning-card >
        
        <template if:true={stepOne}>
            <div class="slds-p-around_medium">
                <lightning-combobox label="Select Order Type" value={selectedOrderType} options={orderTypeOptions} onchange={handleOrderTypeChange}></lightning-combobox>
                <lightning-combobox label="Select Franchise" value={selectedFranchise} options={franchiseOptions} onchange={handleFranchiseChange} disabled={isFranchiseLocked} class="slds-m-top_small"></lightning-combobox>
                <template if:true={isRegularOrder}>
                    <lightning-combobox label="Select Dealer/Distributor" value={selectedDistributor} options={distributorOptions} onchange={handleDistributorChange} class="slds-m-top_small"></lightning-combobox>
                </template>
            </div>

            <div class="slds-grid slds-wrap slds-p-around_medium">
                <template for:each={displayedProducts} for:item="prod">
                    <div key={prod.productId} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-around_small">
                        <div class="slds-box slds-text-align_center">
                            <template if:true={prod.imageUrl}><img src={prod.imageUrl} class="product-image"/></template>
                            <h3 class="slds-text-heading_small slds-m-top_small">{prod.productName}</h3>
                            <template if:true={prod.stockLabel}>
                                <p class={prod.stockLabelClass}>{prod.stockLabel}</p>
                            </template>
                            <div class="slds-m-top_small">
                                <lightning-button-icon icon-name="utility:dash" data-id={prod.productId} onclick={decreaseQty}></lightning-button-icon>
                                <span class="slds-m-horizontal_small slds-text-heading_medium">{prod.quantity}</span>
                                <lightning-button-icon icon-name="utility:add" data-id={prod.productId} onclick={increaseQty}></lightning-button-icon>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </template>

        <template if:true={stepTwo}>
            <div class="slds-p-around_medium">
                <div class="summary-box">
                    <h3>Order Summary</h3>
                    <template for:each={selectedItemsForSummary} for:item="item">
                        <div key={item.productId} class="summary-item-block">
                            <div class={item.summaryRowClass}>
                                <div class="summary-col">
                                    <div class="col-label">Product</div>
                                    <div class="col-value">{item.productName}</div>
                                </div>
                                <div class="summary-col">
                                    <div class="col-label">Qty</div>
                                    <lightning-input 
                                        type="number" 
                                        variant="label-hidden" 
                                        data-id={item.productId} 
                                        value={item.quantity} 
                                        onchange={handleSummaryQtyChange}
                                        class="qty-input-small">
                                    </lightning-input>
                                </div>
                                <template if:false={isSampleOrder}>
                                    <div class="summary-col">
                                        <div class="col-label">Price</div>
                                        <div class="col-value">{item.unitPriceDisplay}</div>
                                    </div>
                                    <div class="summary-col">
                                        <div class="col-label">Subtotal</div>
                                        <div class="col-value">{item.lineTotalDisplay}</div>
                                    </div>
                                    <div class="summary-col">
                                        <div class="col-label discount">Discount</div>
                                        <div class="col-value discount">{item.discountAmountDisplay}</div>
                                    </div>
                                    <div class="summary-col">
                                        <div class="col-label">Total</div>
                                        <div class="col-value">{item.discountedTotalDisplay}</div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <template if:true={isRegularOrder}>
                        <div class="slds-m-top_medium slds-border_top slds-p-top_medium">
                            <h3 class="Apply Scheme">Apply Scheme</h3>
                            <lightning-combobox class="scheme-option" value={selectedSchemeId} options={availableSchemes} onchange={handleSummarySchemeChange}></lightning-combobox>
                        </div>
                    </template>
                </div>

                <template if:true={addressReady}>
                <div class="slds-grid slds-wrap slds-gutters slds-m-top_large">

                     <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                        <div class="address-box">                          
                            <h3>Contact Details</h3>
                            <lightning-input label="Name" name="contactName" value={address.contactName} onchange={handleAddressChange}></lightning-input>
                            <lightning-input label="Phone" name="phone" value={address.phone} onchange={handleAddressChange}></lightning-input>                            
                        </div>
                    </div>

                    <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                        <div class="address-box">
                            
                            <h3>Shipping Address</h3>
                            <lightning-input label="Street" name="shippingStreet" value={address.shippingStreet} onchange={handleAddressChange}></lightning-input>
                            <lightning-input label="City" name="shippingCity" value={address.shippingCity} onchange={handleAddressChange}></lightning-input>
                            <lightning-input label="State" name="shippingState" value={address.shippingState} onchange={handleAddressChange}></lightning-input>
                            <lightning-input label="Postal Code" name="shippingPostalCode" value={address.shippingPostalCode} onchange={handleAddressChange}></lightning-input>
                            <lightning-input label="Country" name="shippingCountry" value={address.shippingCountry} onchange={handleAddressChange}></lightning-input>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-m-top_medium">
                        <lightning-input type="checkbox" label="Billing address same as Shipping" checked={isBillingSame} onchange={handleSameAddress}></lightning-input>
                    </div>
                    <template if:false={isBillingSame}>
                        <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2 slds-m-top_medium">
                            <div class="address-box">
                                <h3>Billing Address</h3>
                                <lightning-input label="Street" name="billingStreet" value={address.billingStreet} onchange={handleAddressChange}></lightning-input>
                                <lightning-input label="City" name="billingCity" value={address.billingCity} onchange={handleAddressChange}></lightning-input>
                                <lightning-input label="State" name="billingState" value={address.billingState} onchange={handleAddressChange}></lightning-input>
                                <lightning-input label="Postal Code" name="billingPostalCode" value={address.billingPostalCode} onchange={handleAddressChange}></lightning-input>
                                <lightning-input label="Country" name="billingCountry" value={address.billingCountry} onchange={handleAddressChange}></lightning-input>
                            </div>
                        </div>
                    </template>
                </div>
                </template>
            </div>
        </template>

        <template if:true={stepThree}>
            <div class="slds-p-around_medium">
                <div class="invoice-totals slds-m-bottom_medium">
                    <div class="slds-grid slds-grid_align-spread"><span>Subtotal:</span><span>{selectedItemsSubtotalDisplay}</span></div>
                    <div class="slds-grid slds-grid_align-spread"><span>Discount:</span><span>{selectedItemsTotalDiscountDisplay}</span></div>
                    <div class="slds-grid slds-grid_align-spread slds-text-bold"><span>Grand Total:</span><span>{computedTotalPriceDisplay}</span></div>
                </div>

                <div class="address-box">
                    <h3>Payment</h3>
                    <lightning-combobox label="Payment Mode" name="mode" value={payment.mode} options={paymentModes} onchange={handlePaymentChange}></lightning-combobox>
                    <template if:true={isCard}>
                        <lightning-input label="Card Number" name="cardNumber" value={payment.cardNumber} onchange={handlePaymentChange}></lightning-input>
                        <lightning-input label="Card Holder" name="cardHolder" value={payment.cardHolder} onchange={handlePaymentChange}></lightning-input>
                        <lightning-input label="Expiry (MM/YY)" name="cardExpiry" value={payment.cardExpiry} onchange={handlePaymentChange}></lightning-input>
                        <lightning-combobox label="Card Type" name="cardType" value={payment.cardType} options={cardOptions} onchange={handlePaymentChange}></lightning-combobox>
                    </template>
                    <template if:true={isUPI}>
                        <lightning-input label="UPI ID" name="upiId" value={payment.upiId} onchange={handlePaymentChange}></lightning-input>
                    </template>
                    <lightning-input type="number" label="Amount to Pay" name="amount" value={payment.amount} onchange={handlePaymentChange} class="slds-m-top_medium">₹</lightning-input>
                </div>
            </div>
        </template>

        <template if:true={stepFour}>
            <div class="success-container slds-text-align_center slds-p-vertical_xx-large">
                <div class="success-checkmark">
                    <div class="check-icon">
                        <span class="icon-line line-tip"></span>
                        <span class="icon-line line-long"></span>
                        <div class="icon-circle"></div>
                        <div class="icon-fix"></div>
                    </div>
                </div>

                <h2 class="success-title slds-m-top_large">Order Placed Successfully!</h2>
                <p class="success-subtitle slds-m-bottom_large">Your order <strong>#{generatedOrderId}</strong> has been confirmed.</p>

                <template if:false={isSampleOrder}>
                    <div class="order-summary-card slds-m-around_large">
                        <div class="slds-grid slds-grid_align-spread slds-p-vertical_x-small border-bottom">
                            <span class="label">Total Amount</span>
                            <span class="value">₹{orderAmt}</span>
                        </div>
                        <div class="slds-grid slds-grid_align-spread slds-p-vertical_x-small">
                            <span class="label">Payment Mode</span>
                            <span class="value">{payment.mode}</span>
                        </div>
                    </div>
                </template>

                <!-- <div class="slds-m-top_xx-large">
                    <button class="btn primary slds-m-right_small" onclick={handleCreateNewOrder}>
                        Create Another Order
                    </button>
                    <button class="btn outline" onclick={handleClose}>
                        Back to Dashboard
                    </button>
                </div> -->
            </div>
        </template>

        <template if:false={stepFour}>
            <div class="slds-p-around_medium slds-grid slds-grid_align-spread slds-border_top slds-m-top_medium">
                </div>
        </template>

        <template if:false={stepFour}>
            <div class="slds-p-around_medium slds-grid slds-grid_align-spread slds-border_top slds-m-top_medium">
                <div><template if:false={stepOne}><button class="btn" onclick={handlePrev}>Back</button></template></div>
                <div>
                    <template if:true={showNextButton}><button class="btn primary" onclick={handleNext}>Next</button></template>
                    <template if:true={showPlaceOrder}><button class="btn primary" onclick={saveOrder}>Place Order</button></template>
                </div>
            </div>
        </template>
        
    </lightning-card>
</template>
