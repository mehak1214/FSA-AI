<template>
    <div class="page-bg">
        <template if:true={isSavingOrder}>
            <div class="saving-overlay">
                <lightning-spinner alternative-text="Creating order" size="medium"></lightning-spinner>
                <p class="saving-overlay-text">Creating order...</p>
            </div>
        </template>

        <!-- ===== TOP NAV ===== -->
        <div class="top-nav">
            <div class="nav-brand">
                <div class="brand-icon">🧾</div>
                <div>
                    <div class="brand-title">Place Order</div>
                    <div class="brand-sub">Review &amp; confirm your order</div>
                </div>
            </div>

            <!-- Order type badge -->
            <template if:true={isSampleOrder}>
                <div class="order-type-badge sample-badge-nav">🎁 Sample Order</div>
            </template>
            <template if:false={isSampleOrder}>
                <template if:true={isRegularOrder}>
                    <div class="order-type-badge regular-badge-nav">🛒 Regular Order</div>
                </template>
            </template>

            <!-- Step indicators -->
            <template if:true={selectedOrderType}>
                <div class="nav-steps">
                    <!-- Step 1 -->
                    <div class={step1NavClass}>
                        <span class="step-num">1</span>
                        <span class="step-lbl">Products</span>
                    </div>
                    <div class="step-connector"></div>
                    <!-- Step 2 -->
                    <div class={step2NavClass}>
                        <span class="step-num">2</span>
                        <span class="step-lbl">Details</span>
                    </div>
                    <!-- Payment step only for Regular -->
                    <template if:true={isRegularOrder}>
                        <div class="step-connector"></div>
                        <div class={step3NavClass}>
                            <span class="step-num">3</span>
                            <span class="step-lbl">Payment</span>
                        </div>
                    </template>
                    <div class="step-connector"></div>
                    <div class={confirmStepNavClass}>
                        <span class="step-num">{confirmStepNum}</span>
                        <span class="step-lbl">Confirm</span>
                    </div>
                </div>
            </template>
        </div>

        <!-- Sample free banner -->
        <template if:true={isSampleOrder}>
            <div class="free-banner">
                <span class="free-banner-icon">🎁</span>
                <div>
                    <strong>Sample Order — 100% Free</strong>
                    <span class="free-banner-sub"> · No payment required · Products are for evaluation only</span>
                </div>
            </div>
        </template>

        <!-- ===== STEP 1: Select Order Type + Products ===== -->
        <template if:true={stepOne}>
            <div class={checkoutLayoutClass}>
                <div class="main-col">

                    <!-- Order Config Card - Full width until distributor selected -->
                    <div class="section-card order-config-card">
                        <div class="section-header">
                            <span class="section-icon">⚙️</span>
                            <span class="section-title">Order Configuration</span>
                        </div>
                        <div class="section-body">
                            <div class="field-row">
                                <div class="field-group">
                                    <lightning-combobox
                                        label="Order Type"
                                        value={selectedOrderType}
                                        options={orderTypeOptions}
                                        onchange={handleOrderTypeChange}>
                                    </lightning-combobox>
                                </div>
                                <div class="field-group">
                                    <lightning-combobox
                                        label="Franchise"
                                        value={selectedFranchise}
                                        options={franchiseOptions}
                                        onchange={handleFranchiseChange}
                                        disabled={isFranchiseLocked}>
                                    </lightning-combobox>
                                </div>
                            </div>
                            <template if:true={isRegularOrder}>
                                <div class="field-row single">
                                    <div class="field-group dropdown-container">
                                        <lightning-combobox
                                            label="Dealer / Distributor"
                                            value={selectedDistributor}
                                            options={distributorOptions}
                                            onchange={handleDistributorChange}
                                            class="distributor-dropdown">
                                        </lightning-combobox>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Products Card - Show only if distributor selected -->
                    <template if:true={shouldShowSelectProducts}>
                        <div class="section-card">
                            <div class="section-header">
                                <span class="section-icon">📦</span>
                                <span class="section-title">Select Products</span>
                            </div>
                            <div class="products-grid">
                                <template for:each={displayedProducts} for:item="prod">
                                    <div key={prod.productId} class={prod.cardClass}>
                                        <template if:true={prod.imageUrl}>
                                            <img src={prod.imageUrl} class="product-image" alt={prod.productName} />
                                        </template>
                                        <p class="product-name">{prod.productName}</p>
                                        <template if:true={prod.stockLabel}>
                                            <span class={prod.stockLabelClass}>{prod.stockLabel}</span>
                                        </template>
                                        <div class="qty-ctrl">
                                            <button class="iq-btn" data-id={prod.productId} onclick={decreaseQty}>−</button>
                                            <span class="iq-val">{prod.quantity}</span>
                                            <button class="iq-btn" data-id={prod.productId} onclick={increaseQty}>+</button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                </div>

                <!-- Floating Cart Button - Long Press to Remove -->
                <template if:true={hasSelectedItems}>
                    <template if:false={isCartButtonHidden}>
                        <div class="floating-cart-container">
                            <button 
                                class="floating-cart-btn"
                                onclick={toggleCartModal}
                                onmousedown={handleCartLongPressStart}
                                onmouseup={handleCartLongPressEnd}
                                onmouseleave={handleCartLongPressCancel}
                                ontouchstart={handleCartLongPressStart}
                                ontouchend={handleCartLongPressEnd}
                                ontouchcancel={handleCartLongPressCancel}
                                title="View cart - Long press to remove">
                                <span class="cart-icon">🛒</span>
                                <span class="cart-badge">{cartItemCount}</span>
                            </button>
                            <template if:true={showCartRemoveBtn}>
                                <button class="cart-remove-btn" onclick={removeCartButton} title="Remove cart">
                                    ✕
                                </button>
                            </template>
                        </div>
                    </template>
                </template>
            </div>

            <!-- Cart Modal Overlay -->
            <template if:true={isCartModalOpen}>
                <div class="cart-modal-overlay" onclick={closeCartModal}></div>
                <div class="cart-modal-panel">
                    <div class="cart-modal-header">
                        <h3>Shopping Cart</h3>
                        <button class="modal-close-btn" onclick={closeCartModal} title="Close cart">✕</button>
                    </div>
                    <div class="cart-modal-content">
                        <template if:true={hasSelectedItems}>
                            <template for:each={selectedItemsForSummary} for:item="item">
                                <div key={item.productId} class="cart-item">
                                    <div class="cart-item-info">
                                        <span class="cart-item-name">{item.productName}</span>
                                        <span class="cart-item-qty">Qty: {item.quantity}</span>
                                    </div>
                                    <template if:false={isSampleOrder}>
                                        <div class="cart-item-price">₹{item.discountedTotalDisplay}</div>
                                    </template>
                                </div>
                            </template>
                            <div class="cart-divider"></div>
                            <div class="cart-total-section">
                                <template if:false={isSampleOrder}>
                                    <div class="cart-summary-line">
                                        <span>Subtotal</span>
                                        <span>₹{selectedItemsSubtotalDisplay}</span>
                                    </div>
                                    <div class="cart-summary-line">
                                        <span>Discount</span>
                                        <span class="discount-text">-₹{selectedItemsTotalDiscountDisplay}</span>
                                    </div>
                                    <div class="cart-divider"></div>
                                    <div class="cart-total-line">
                                        <span>Total</span>
                                        <span>₹{computedTotalPriceDisplay}</span>
                                    </div>
                                </template>
                                <template if:true={isSampleOrder}>
                                    <div class="cart-total-line free-total">
                                        <span>Total Payable</span>
                                        <span>₹0.00</span>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- Footer with Navigation Buttons - Show only when dealer selected or products exist -->
            <template if:true={shouldShowFooter}>
                <div class="step-footer">
                    <template if:true={hasSelectedItems}>
                        <button class="btn-secondary" onclick={handlePrev} disabled={isBackButtonDisabled}>← Back</button>
                    <button class="btn-primary" onclick={handleNext} disabled={isNextButtonDisabled}>Next →</button>
                    </template>
                </div>
            </template>
        </template>

        <!-- ===== STEP 2: Order Summary + Address ===== -->
        <template if:true={stepTwo}>
            <div class="step-wrapper">
            <div class="step-content">
            <div class="checkout-layout">
                <div class="main-col">

                    <!-- Order Summary Cards -->
                    <div class="section-card">
                        <div class="section-header">
                            <span class="section-icon">📋</span>
                            <span class="section-title">Order Summary</span>
                        </div>
                        <div class="summary-items-list">
                            <template for:each={selectedItemsForSummary} for:item="item">
                                <div key={item.productId} class="summary-item-card">
                                    <div class="item-header">
                                        <span class="item-name">{item.productName}</span>
                                        <div class="item-qty-ctrl">
                                            <span class="qty-label">Qty:</span>
                                            <lightning-input
                                                type="number"
                                                variant="label-hidden"
                                                data-id={item.productId}
                                                value={item.quantity}
                                                onchange={handleSummaryQtyChange}
                                                class="qty-input-summary">
                                            </lightning-input>
                                        </div>
                                    </div>
                                    <template if:false={isSampleOrder}>
                                        <div class="item-breakdown">
                                            <div class="breakdown-row">
                                                <span class="breakdown-label">Unit Price × Qty</span>
                                                <span class="breakdown-value">₹{item.unitPriceDisplay} × {item.quantity}</span>
                                            </div>
                                            <div class="breakdown-row">
                                                <span class="breakdown-label">Subtotal</span>
                                                <span class="breakdown-value">₹{item.lineTotalDisplay}</span>
                                            </div>
                                            <div class="breakdown-row discount-row">
                                                <span class="breakdown-label">Discount</span>
                                                <span class="breakdown-value discount-value">-₹{item.discountAmountDisplay}</span>
                                            </div>
                                            <div class="breakdown-divider"></div>
                                            <div class="breakdown-row total-row">
                                                <span class="breakdown-label">Total</span>
                                                <span class="breakdown-value total-value">₹{item.discountedTotalDisplay}</span>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>

                        <!-- Scheme selector (Regular only) -->
                        <template if:true={isRegularOrder}>
                            <div class="scheme-row">
                                <div class="scheme-row-label">🏷️ Apply Scheme</div>
                                <lightning-combobox
                                    value={selectedSchemeId}
                                    options={availableSchemes}
                                    onchange={handleSummarySchemeChange}>
                                </lightning-combobox>
                            </div>
                        </template>
                    </div>

                    <!-- Address -->
                    <template if:true={addressReady}>
                        <div class="section-card">
                            <div class="section-header">
                                <span class="section-icon">👤</span>
                                <span class="section-title">Contact Details</span>
                            </div>
                            <div class="section-body">
                                <div class="field-row">
                                    <div class="field-group">
                                        <lightning-input label="Name" name="contactName" value={address.contactName} onchange={handleAddressChange}></lightning-input>
                                    </div>
                                    <div class="field-group">
                                        <lightning-input label="Phone" name="phone" value={address.phone} onchange={handleAddressChange}></lightning-input>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="section-card">
                            <div class="section-header">
                                <span class="section-icon">🚚</span>
                                <span class="section-title">Shipping Address</span>
                            </div>
                            <div class="section-body">
                                <div class="field-row">
                                    <div class="field-group">
                                        <lightning-input label="Street" name="shippingStreet" value={address.shippingStreet} onchange={handleAddressChange}></lightning-input>
                                    </div>
                                    <div class="field-group">
                                        <lightning-input label="City" name="shippingCity" value={address.shippingCity} onchange={handleAddressChange}></lightning-input>
                                    </div>
                                    <div class="field-group">
                                        <lightning-input label="State" name="shippingState" value={address.shippingState} onchange={handleAddressChange}></lightning-input>
                                    </div>
                                    <div class="field-group">
                                        <lightning-input label="Postal Code" name="shippingPostalCode" value={address.shippingPostalCode} onchange={handleAddressChange}></lightning-input>
                                    </div>
                                    <div class="field-group">
                                        <lightning-input label="Country" name="shippingCountry" value={address.shippingCountry} onchange={handleAddressChange}></lightning-input>
                                    </div>
                                </div>
                                <div style="margin-top:8px;">
                                    <lightning-input
                                        type="checkbox"
                                        label="Billing address same as Shipping"
                                        checked={isBillingSame}
                                        onchange={handleSameAddress}>
                                    </lightning-input>
                                </div>
                            </div>
                        </div>

                        <template if:false={isBillingSame}>
                            <div class="section-card">
                                <div class="section-header">
                                    <span class="section-icon">🏢</span>
                                    <span class="section-title">Billing Address</span>
                                    <span class="optional-tag">Different</span>
                                </div>
                                <div class="section-body">
                                    <div class="field-row">
                                        <div class="field-group">
                                            <lightning-input label="Street" name="billingStreet" value={address.billingStreet} onchange={handleAddressChange}></lightning-input>
                                        </div>
                                        <div class="field-group">
                                            <lightning-input label="City" name="billingCity" value={address.billingCity} onchange={handleAddressChange}></lightning-input>
                                        </div>
                                        <div class="field-group">
                                            <lightning-input label="State" name="billingState" value={address.billingState} onchange={handleAddressChange}></lightning-input>
                                        </div>
                                        <div class="field-group">
                                            <lightning-input label="Postal Code" name="billingPostalCode" value={address.billingPostalCode} onchange={handleAddressChange}></lightning-input>
                                        </div>
                                        <div class="field-group">
                                            <lightning-input label="Country" name="billingCountry" value={address.billingCountry} onchange={handleAddressChange}></lightning-input>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </template>
                </div>

                <!-- Side summary -->
                <div class="side-col">
                    <div class="price-card">
                        <div class="price-card-header"><span>📦</span><span>Order at a Glance</span></div>
                        <template for:each={selectedItemsForSummary} for:item="item">
                            <div key={item.productId} class="mini-item">
                                <span class="mini-item-name">{item.productName}</span>
                                <span class="mini-item-qty">×{item.quantity}</span>
                            </div>
                        </template>
                        <div class="price-divider"></div>
                        <template if:false={isSampleOrder}>
                            <div class="price-line"><span>Subtotal</span><span>₹{selectedItemsSubtotalDisplay}</span></div>
                            <div class="price-line discount"><span>Discount</span><span>-₹{selectedItemsTotalDiscountDisplay}</span></div>
                            <div class="price-divider"></div>
                            <div class="price-total-line"><span>Grand Total</span><span>₹{computedTotalPriceDisplay}</span></div>
                        </template>
                        <template if:true={isSampleOrder}>
                            <div class="price-total-line free-total-line"><span>Total Payable</span><span class="free-total-val">₹0.00</span></div>
                        </template>
                    </div>
                </div>
            </div>
            </div><!-- /.step-content -->

            <!-- Footer with Navigation Buttons -->
            <div class="step-footer">
                <button class="btn-secondary" onclick={handlePrev} disabled={isBackButtonDisabled}>← Back</button>
                <template if:true={showNextButton}>
                    <button class="btn-primary" onclick={handleNext} disabled={isNextButtonDisabled}>Next →</button>
                </template>
                <template if:true={showPlaceOrder}>
                    <button class="btn-place-order" onclick={saveOrder} disabled={isPlaceOrderDisabled}>
                        <template if:true={isSavingOrder}>
                            <lightning-spinner alternative-text="Creating sample order" size="small" variant="brand"></lightning-spinner>
                            <span>Creating Sample Order...</span>
                        </template>
                        <template if:false={isSavingOrder}>
                            <span>Place Sample Order</span>
                        </template>
                    </button>
                </template>
            </div>
            </div><!-- /.step-wrapper -->
        </template>
        <template if:true={stepThree}>
            <div class="step-wrapper">
            <div class="step-content">
            <div class="checkout-layout">
                <div class="main-col">
                    <div class="section-card">
                        <div class="section-header">
                            <span class="section-icon">💳</span>
                            <span class="section-title">Payment Method</span>
                        </div>
                        <div class="payment-methods">
                            <div class={cashCardClass} onclick={selectCash}>
                                <span class="pm-icon">💵</span>
                                <div class="pm-info">
                                    <p class="pm-name">Cash</p>
                                    <p class="pm-desc">Pay in cash at time of delivery</p>
                                </div>
                                <span class={cashRadioClass}></span>
                            </div>
                            <div class={upiCardClass} onclick={selectUPI}>
                                <span class="pm-icon">📱</span>
                                <div class="pm-info">
                                    <p class="pm-name">UPI</p>
                                    <p class="pm-desc">Pay instantly via UPI ID</p>
                                </div>
                                <span class={upiRadioClass}></span>
                            </div>
                            <div class={cardCardClass} onclick={selectCard}>
                                <span class="pm-icon">💳</span>
                                <div class="pm-info">
                                    <p class="pm-name">Card</p>
                                    <p class="pm-desc">Visa, MasterCard or RuPay</p>
                                </div>
                                <span class={cardRadioClass}></span>
                            </div>
                        </div>

                        <!-- NEW: Payable Amount (Editable) -->
                        <div class="payment-extra">
                            <div class="field-group">
                                <lightning-input 
                                    label="Payable Amount (₹)" 
                                    name="payableAmount" 
                                    type="number" 
                                    value={payableAmount} 
                                    onchange={handlePayableAmountChange}
                                    placeholder="Enter amount to pay"
                                    step="0.01"
                                    min="0">
                                </lightning-input>
                                <small style="display: block; margin-top: 5px; color: #666;">
                                    Grand Total: ₹{computedTotalPriceDisplay} | Outstanding: ₹{outstandingAmount}
                                </small>
                            </div>
                        </div>

                        <!-- UPI extra -->
                        <template if:true={isUPI}>
                            <div class="payment-extra">
                                <lightning-input label="UPI ID" name="upiId" value={payment.upiId} onchange={handlePaymentChange}></lightning-input>
                            </div>
                        </template>

                        <!-- Card extra -->
                        <template if:true={isCard}>
                            <div class="payment-extra">
                                <div class="field-row">
                                    <div class="field-group">
                                        <lightning-input label="Card Number" name="cardNumber" value={payment.cardNumber} onchange={handlePaymentChange}></lightning-input>
                                    </div>
                                    <div class="field-group">
                                        <lightning-input label="Card Holder" name="cardHolder" value={payment.cardHolder} onchange={handlePaymentChange}></lightning-input>
                                    </div>
                                    <div class="field-group">
                                        <lightning-input label="Expiry (MM/YY)" name="cardExpiry" value={payment.cardExpiry} onchange={handlePaymentChange}></lightning-input>
                                    </div>
                                    <div class="field-group">
                                        <lightning-combobox label="Card Type" name="cardType" value={payment.cardType} options={cardOptions} onchange={handlePaymentChange}></lightning-combobox>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Side: totals -->
                <div class="side-col">
                    <div class="price-card">
                        <div class="price-card-header"><span>💰</span><span>Amount Due</span></div>
                        <div class="price-line"><span>Subtotal</span><span>₹{selectedItemsSubtotalDisplay}</span></div>
                        <div class="price-line discount"><span>Discount</span><span>-₹{selectedItemsTotalDiscountDisplay}</span></div>
                        <div class="price-divider"></div>
                        <div class="price-line"><span>Grand Total</span><span>₹{computedTotalPriceDisplay}</span></div>
                        <div class="price-divider"></div>
                        <div class="price-line highlight"><span>Payable Amount</span><span>₹{payableAmountDisplay}</span></div>
                        <div class="price-line"><span>Outstanding</span><span>₹{outstandingAmount}</span></div>
                        <div class="price-divider"></div>
                        <div class="price-line status-line"><span>Payment Status</span><span style="font-weight: 600; color: #0070d2;">{displayPaymentStatus}</span></div>
                    </div>
                </div>
            </div>
            </div><!-- /.step-content -->

            <!-- Footer with Navigation Buttons -->
            <div class="step-footer">
                <button class="btn-secondary" onclick={handlePrev} disabled={isBackButtonDisabled}>← Back</button>
                <template if:true={showNextButton}>
                    <button class="btn-primary" onclick={handleNext} disabled={isNextButtonDisabled}>Review Order →</button>
                </template>
                <template if:true={showPlaceOrder}>
                    <button class="btn-place-order" onclick={saveOrder} disabled={isPlaceOrderDisabled}>
                        <template if:true={isSavingOrder}>
                            <lightning-spinner alternative-text="Creating order" size="small" variant="brand"></lightning-spinner>
                            <span>Creating Order...</span>
                        </template>
                        <template if:false={isSavingOrder}>
                            <span>Place Order</span>
                        </template>
                    </button>
                </template>
            </div>
            </div><!-- /.step-wrapper -->
        </template>

        <!-- ===== STEP 3 (Sample) or STEP 4 (Regular): CONFIRMATION/REVIEW ===== -->
        <template if:true={stepConfirm}>
            <div class="step-wrapper">
            <div class="step-content">
            <div class="checkout-layout">
                <div class="main-col">
                    <!-- Products Card -->
                    <div class="section-card">
                        <div class="section-header">
                            <span class="section-icon">📦</span>
                            <span class="section-title">Products</span>
                        </div>
                        <div class="summary-items-list">
                            <template for:each={selectedItemsForSummary} for:item="item">
                                <div key={item.productId} class="confirmation-item-card">
                                    <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;">
                                        <div style="flex: 1;">
                                            <p style="margin: 0 0 5px 0; font-weight: 600; color: #1a3a6b;">{item.productName}</p>
                                            <p style="margin: 0; font-size: 12px; color: #666;">Qty: {item.quantity} × ₹{item.unitPriceDisplay}</p>
                                        </div>
                                        <div style="text-align: right; flex-shrink: 0;">
                                            <p style="margin: 0 0 5px 0; font-weight: 700; color: #1a3a6b;">₹{item.discountedTotalDisplay}</p>
                                            <template if:true={item.discountAmount}>
                                                <p style="margin: 0; font-size: 11px; color: #27ae60;">-₹{item.discountAmountDisplay}</p>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Unified Order Financials Card -->
                    <div class="section-card">
                        <div class="section-header">
                            <span class="section-icon">💰</span>
                            <span class="section-title">Order Financials</span>
                        </div>
                        <div class="section-body confirm-financials">
                            <div class="cf-row">
                                <span class="cf-label">Subtotal</span>
                                <span class="cf-val">₹{selectedItemsSubtotalDisplay}</span>
                            </div>
                            <div class="cf-row cf-discount">
                                <span class="cf-label">Discount</span>
                                <span class="cf-val">−₹{selectedItemsTotalDiscountDisplay}</span>
                            </div>
                            <div class="cf-divider"></div>
                            <div class="cf-row cf-grand">
                                <span class="cf-label">Grand Total</span>
                                <span class="cf-val cf-grand-val">₹{computedTotalPriceDisplay}</span>
                            </div>
                            <template if:false={isSampleOrder}>
                                <div class="cf-divider"></div>
                                <div class="cf-row">
                                    <span class="cf-label">Payment Method</span>
                                    <span class="cf-val cf-badge">{payment.mode}</span>
                                </div>
                                <div class="cf-highlight-box">
                                    <div class="cf-row">
                                        <span class="cf-label">Payable Now</span>
                                        <span class="cf-val cf-payable">₹{payableAmountDisplay}</span>
                                    </div>
                                    <div class="cf-row">
                                        <span class="cf-label">Outstanding</span>
                                        <span class="cf-val cf-outstanding">₹{outstandingAmount}</span>
                                    </div>
                                </div>
                            </template>
                            <template if:true={isSampleOrder}>
                                <div class="cf-divider"></div>
                                <div class="cf-row cf-grand">
                                    <span class="cf-label">Total Payable</span>
                                    <span class="cf-val" style="color:#27ae60; font-size:16px; font-weight:800;">₹0.00 — Free</span>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- No side col on confirm step — financials are consolidated above -->
            </div>
            </div><!-- /.step-content -->

            <!-- Footer with Navigation Buttons -->
            <div class="step-footer">
                <button class="btn-secondary" onclick={handlePrev} disabled={isBackButtonDisabled}>← Back</button>
                <button class="btn-place-order" onclick={saveOrder} disabled={isPlaceOrderDisabled}>
                    <template if:true={isSavingOrder}>
                        <lightning-spinner alternative-text="Creating order" size="small" variant="brand"></lightning-spinner>
                        <span>Creating Order...</span>
                    </template>
                    <template if:false={isSavingOrder}>
                        <template if:true={isSampleOrder}>
                            <span>Place Sample Order</span>
                        </template>
                        <template if:false={isSampleOrder}>
                            <span>Place Order</span>
                        </template>
                    </template>
                </button>
            </div>
            </div><!-- /.step-wrapper -->
        </template>

        <!-- ===== STEP 4 (Sample) or STEP 5 (Regular): SUCCESS ===== -->
        <template if:true={stepFour}>
            <div class="success-page">
                <div class="success-card">
                    <!-- Animated checkmark -->
                    <div class="success-checkmark">
                        <div class="check-icon"></div>
                    </div>

                    <h2 class="success-title">{successTitle}</h2>
                    <p class="success-sub">{successSubtitle}</p>

                    <template if:false={isSampleOrder}>
                        <div class="success-order-detail">
                            <div class="success-detail-row">
                                <span>Grand Total</span>
                                <span class="success-amount">₹{orderAmt}</span>
                            </div>
                            <div class="success-detail-row">
                                <span>Payable Amount</span>
                                <span class="success-payable">₹{payableAmountDisplay}</span>
                            </div>
                            <div class="success-detail-row">
                                <span>Outstanding</span>
                                <span class="success-outstanding">₹{outstandingAmount}</span>
                            </div>
                            <div class="success-detail-row">
                                <span>Payment Mode</span>
                                <span class="success-badge">{payment.mode}</span>
                            </div>
                            <div class="success-detail-row">
                                <span>Status</span>
                                <span class="success-status">{displayPaymentStatus}</span>
                            </div>
                        </div>
                    </template>

                    <div class="success-note" if:true={isSampleOrder}>
                        🎁 Samples will be delivered as per the request. Thank you!
                    </div>
                    <div class="success-note" if:false={isSampleOrder}>
                        📧 Your order has been confirmed and is being processed. Expected delivery in 3–5 business days.
                    </div>
                </div>
            </div>
        </template>

    </div>
</template>
