<template>
    <dialog class="ccm-dialog" onclose={handleDialogClose}>

        <div class="ccm-backdrop" onclick={handleCloseModal}></div>

        <div class="ccm-shell">

            <!-- ── Header ── -->
            <header class="ccm-header">
                <div class="ccm-title-row">
                    <span class="ccm-badge">Case</span>
                    <h2 class="ccm-title">Create Support Case</h2>
                </div>
                <button class="ccm-close-btn" type="button" onclick={handleCloseModal} aria-label="Close">&#10005;</button>
            </header>

            <!-- ── Body ── -->
            <div class="ccm-body">

                    <!-- Loading Spinner -->
                    <template if:true={isLoading}>
                        <div class="ccm-spinner-wrap">
                            <lightning-spinner alternative-text="Loading form data" size="medium"></lightning-spinner>
                        </div>
                    </template>

                    <!-- Order Information Panel -->
                    <template if:false={isLoading}>

                        <!-- Order Info Card -->
                        <div class="ccm-info-card">
                            <div class="ccm-info-grid">
                                <div class="ccm-info-item">
                                    <span class="ccm-info-label">Order #</span>
                                    <span class="ccm-info-value">{orderInfo.orderNumber}</span>
                                </div>
                                <div class="ccm-info-item">
                                    <span class="ccm-info-label">Account</span>
                                    <span class="ccm-info-value">{orderInfo.accountName}</span>
                                </div>
                                <div class="ccm-info-item">
                                    <span class="ccm-info-label">Amount</span>
                                    <span class="ccm-info-value">{orderInfo.orderAmount}</span>
                                </div>
                                <div class="ccm-info-item">
                                    <span class="ccm-info-label">Status</span>
                                    <span class="ccm-info-value">{orderInfo.orderStatus}</span>
                                </div>
                            </div>
                        </div>

                        <!-- Error Message -->
                        <template if:true={errorMessage}>
                            <div class="ccm-error-box" role="alert" aria-live="assertive">
                                {errorMessage}
                            </div>
                        </template>

                        <!-- Form Section -->
                        <form class="ccm-form" role="form" aria-label="Create Case Form">

                            <h3 class="ccm-form-section-title">Case Details <span class="ccm-required-note">(All fields required)</span></h3>

                            <!-- Subject Input -->
                            <div class="ccm-field">
                                <label class="ccm-label" for="subject-input">
                                    <abbr class="ccm-required" title="required">*</abbr>Subject
                                </label>
                                <input id="subject-input"
                                       class="ccm-input"
                                       type="text"
                                       placeholder="Enter case subject (10-255 characters)"
                                       value={formData.subject}
                                       onchange={handleSubjectChange}
                                       disabled={isSaving}
                                       maxlength="255"
                                       required
                                       aria-required="true"
                                       aria-describedby="subject-error subject-counter" />
                                <span id="subject-counter" class="ccm-char-counter" aria-live="polite">
                                    {charCounts.subject}/255
                                </span>
                                <template if:true={fieldErrors.subject}>
                                    <div id="subject-error" class="ccm-field-error" role="alert">{fieldErrors.subject}</div>
                                </template>
                            </div>

                            <!-- Description Input -->
                            <div class="ccm-field">
                                <label class="ccm-label" for="description-input">
                                    <abbr class="ccm-required" title="required">*</abbr>Description
                                </label>
                                <textarea id="description-input"
                                          class="ccm-input ccm-textarea"
                                          placeholder="Describe the issue in detail (20-4000 characters)"
                                          value={formData.description}
                                          onchange={handleDescriptionChange}
                                          disabled={isSaving}
                                          rows="4"
                                          maxlength="4000"
                                          required
                                          aria-required="true"
                                          aria-describedby="description-error description-counter"></textarea>
                                <span id="description-counter" class="ccm-char-counter" aria-live="polite">
                                    {charCounts.description}/4000
                                </span>
                                <template if:true={fieldErrors.description}>
                                    <div id="description-error" class="ccm-field-error" role="alert">{fieldErrors.description}</div>
                                </template>
                            </div>

                            <!-- Case Type Combobox -->
                            <div class="ccm-field">
                                <label class="ccm-label">
                                    <abbr class="ccm-required" title="required">*</abbr>Case Type
                                </label>
                                <lightning-combobox
                                    name="type"
                                    label="Select Case Type"
                                    value={formData.caseType}
                                    options={typeOptions}
                                    onchange={handleCaseTypeChange}
                                    disabled={isSaving}
                                    required
                                    aria-required="true"
                                    aria-describedby="type-error">
                                </lightning-combobox>
                                <template if:true={fieldErrors.caseType}>
                                    <div id="type-error" class="ccm-field-error" role="alert">{fieldErrors.caseType}</div>
                                </template>
                            </div>

                            <!-- Reason Combobox -->
                            <div class="ccm-field">
                                <label class="ccm-label">
                                    <abbr class="ccm-required" title="required">*</abbr>Reason
                                </label>
                                <lightning-combobox
                                    name="reason"
                                    label="Select Reason"
                                    value={formData.reason}
                                    options={reasonOptions}
                                    onchange={handleReasonChange}
                                    disabled={isSaving}
                                    required
                                    aria-required="true"
                                    aria-describedby="reason-error">
                                </lightning-combobox>
                                <template if:true={fieldErrors.reason}>
                                    <div id="reason-error" class="ccm-field-error" role="alert">{fieldErrors.reason}</div>
                                </template>
                            </div>

                            <!-- Solution Required Combobox -->
                            <div class="ccm-field">
                                <label class="ccm-label">
                                    <abbr class="ccm-required" title="required">*</abbr>Solution Required
                                </label>
                                <lightning-combobox
                                    name="solution"
                                    label="Select Solution Type"
                                    value={formData.solution}
                                    options={solutionOptions}
                                    onchange={handleSolutionChange}
                                    disabled={isSaving}
                                    required
                                    aria-required="true"
                                    aria-describedby="solution-error">
                                </lightning-combobox>
                                <template if:true={fieldErrors.solution}>
                                    <div id="solution-error" class="ccm-field-error" role="alert">{fieldErrors.solution}</div>
                                </template>
                            </div>

                            <!-- File Upload -->
                            <div class="ccm-field">
                                <label class="ccm-label">
                                    Upload Proof/Product Image
                                    <span class="ccm-optional-note">(Optional | Max 5MB | JPG, PNG, GIF, PDF)</span>
                                </label>
                                <template if:false={uploadState.fileName}>
                                    <lightning-file-upload
                                        accept=".jpg,.jpeg,.png,.gif,.pdf"
                                        onuploadfinished={handleFileUploadFinished}
                                        disabled={uploadState.isUploading}
                                        multiple="false"
                                        class="ccm-file-upload">
                                    </lightning-file-upload>
                                </template>
                                <template if:true={uploadState.fileName}>
                                    <div class="ccm-file-uploaded">
                                        <lightning-icon icon-name="utility:success" size="small" alternative-text="File selected"></lightning-icon>
                                        <div class="ccm-file-info">
                                            <span class="ccm-file-name">{uploadState.fileName}</span>
                                            <span class="ccm-file-size">{uploadState.fileSize}</span>
                                        </div>
                                        <button class="ccm-file-remove-btn" onclick={handleClearFile} type="button" aria-label="Remove file">&#10005;</button>
                                    </div>
                                </template>
                                <template if:true={uploadState.uploadError}>
                                    <div class="ccm-field-error" role="alert">{uploadState.uploadError}</div>
                                </template>
                            </div>

                            <!-- Additional Comments -->
                            <div class="ccm-field">
                                <label class="ccm-label" for="comments-input">Additional Comments</label>
                                <textarea id="comments-input"
                                          class="ccm-input ccm-textarea"
                                          placeholder="Add any additional notes or comments (optional)"
                                          value={formData.comments}
                                          onchange={handleCommentsChange}
                                          disabled={isSaving}
                                          rows="3"
                                          maxlength="1000"
                                          aria-describedby="comments-counter"></textarea>
                                <span id="comments-counter" class="ccm-char-counter" aria-live="polite">
                                    {charCounts.comments}/1000
                                </span>
                            </div>

                        </form>

                    </template>

            </div><!-- /ccm-body -->

            <!-- ── Footer ── -->
            <footer class="ccm-footer">
                <button class="ccm-btn-secondary" type="button" onclick={handleCloseModal} disabled={isSaving}>
                    Cancel
                </button>
                <button class="ccm-btn-primary" type="submit" onclick={handleSaveCase} disabled={hasValidationDisabled}>
                    <template if:false={isSaving}>&#10003; Create Case</template>
                    <template if:true={isSaving}>
                        <lightning-spinner size="small" alternative-text="Creating case"></lightning-spinner>
                        Creating...
                    </template>
                </button>
            </footer>

        </div><!-- /ccm-shell -->
    </dialog>
</template>
